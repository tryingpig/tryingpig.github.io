<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노력하는뚱땡이의 학습공간</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; line-height: 1.6; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
    ul { list-style: none; padding: 0; }
    li { padding: 12px 0; border-bottom: 1px solid #eee; }
    .date { color: #888; font-size: 0.9em; margin-right: 8px; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>노력하는뚱땡이의 학습공간</h1>
  <ul id="post-list"></ul>

  <script>
    fetch('posts.json')
      .then(res => res.json())
      .then(posts => {
        posts.sort((a, b) => b.date.localeCompare(a.date));
        const list = document.getElementById('post-list');
        posts.forEach(post => {
          const li = document.createElement('li');
          li.innerHTML = '<span class="date">' + post.date + '</span>' +
                         '<a href="' + post.file + '">' + post.title + '</a>';
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('post-list').innerHTML = '<li>아직 글이 없습니다.</li>';
      });
  </script>
</body>
</html>
