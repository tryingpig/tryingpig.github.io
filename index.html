<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노력하는뚱땡이의 학습공간</title>
  <meta name="description" content="노력하는뚱땡이의 학습공간 — 투자·개발 학습 기록과 직접 만든 프로젝트 모음." />
  <script>
    /* 초기 테마 즉시 적용 (화면 깜빡임 방지). 저장값 없으면 시스템 설정 따름 */
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #f4f1ea;
      --bg-2: #efebe1;
      --card: #faf8f2;
      --ink: #1c1a17;
      --ink-soft: #5c574d;
      --muted: #918b7d;
      --line: #ddd6c6;
      --line-soft: #e7e1d3;
      --accent: #1c1a17;
      --nav-bg: rgba(244,241,234,0.82);
      --card-shadow: rgba(28,26,23,0.08);
      --mono: "JetBrains Mono", "D2Coding", ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      color-scheme: light;
    }
    /* 다크 팔레트 — 따뜻한 차콜톤으로 라이트 감성 유지 */
    :root[data-theme="dark"] {
      --bg: #17150f;
      --bg-2: #1e1b14;
      --card: #201d16;
      --ink: #ece7db;
      --ink-soft: #b8b0a0;
      --muted: #8b8372;
      --line: #37322a;
      --line-soft: #2b2721;
      --accent: #ece7db;
      --nav-bg: rgba(23,21,15,0.82);
      --card-shadow: rgba(0,0,0,0.38);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--sans); line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background .3s ease, color .3s ease;
    }
    a { color: inherit; text-decoration: none; }
    .mono { font-family: var(--mono); }
    .wrap { max-width: 920px; margin: 0 auto; padding: 0 22px; }

    /* ── Nav ── */
    header.nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--nav-bg); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-soft);
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .brand { font-family: var(--mono); font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .nav-links { display: flex; align-items: center; gap: 22px; }
    .nav-links a {
      font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--ink-soft);
    }
    .nav-links a:hover { color: var(--ink); }
    .theme-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; padding: 0; border-radius: 999px; cursor: pointer;
      background: transparent; border: 1px solid var(--line); color: var(--ink-soft);
      transition: color .15s, border-color .15s, background .15s;
    }
    .theme-toggle:hover { color: var(--ink); border-color: var(--muted); background: var(--bg-2); }
    .theme-toggle svg { width: 16px; height: 16px; }
    .theme-toggle .i-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .i-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .i-sun { display: inline; }
    .pill {
      font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.2px; text-transform: uppercase;
      background: var(--accent); color: var(--bg) !important; padding: 9px 16px; border-radius: 999px;
      transition: transform .15s, opacity .15s;
    }
    .pill:hover { transform: translateY(-1px); opacity: .9; }
    @media (max-width: 600px) { .nav-links .hide-sm { display: none; } }

    /* ── Hero ── */
    /* 세로 패딩만 지정 (좌우 패딩은 .wrap의 22px 유지 — 단축 padding은 좌우를 0으로 덮어써 모바일에서 본문이 화면 끝에 붙는 버그) */
    .hero { padding-top: 78px; padding-bottom: 52px; }
    .eyebrow {
      font-family: var(--mono); font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px;
    }
    .hero h1 {
      font-family: var(--mono); font-weight: 700; line-height: 1.12;
      font-size: clamp(34px, 7vw, 60px); letter-spacing: -1px; margin: 0 0 18px;
    }
    .hero h1 .accent { color: var(--muted); }
    .hero p.lead { font-size: 16px; color: var(--ink-soft); margin: 0; white-space: nowrap; }
    @media (max-width: 940px) { .hero p.lead { white-space: normal; font-size: 15px; max-width: 540px; } }

    /* ── Section heads ── */
    .sec { padding-top: 40px; padding-bottom: 40px; }  /* 좌우는 .wrap 22px 유지 */
    .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
    .sec-head h2 { font-family: var(--mono); font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; margin: 0; font-weight: 700; }
    .sec-head .count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* ── Project cards ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 13px;
      padding: 15px 16px; display: flex; flex-direction: column; gap: 7px;
      transition: transform .16s, box-shadow .16s, border-color .16s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px var(--card-shadow); border-color: var(--muted); }
    .card .emoji { font-size: 21px; }
    .card .c-en { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }
    .card .c-ko { font-size: 12.5px; color: var(--ink-soft); }
    .card .c-desc { font-size: 12px; color: var(--muted); line-height: 1.5; flex: 1; }
    .card .c-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
    .card .c-tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
    .card .c-go { font-family: var(--mono); font-size: 16px; }
    .empty { font-family: var(--mono); font-size: 13px; color: var(--muted); padding: 8px 0; }

    /* ── Search ── */
    .search-row { margin-bottom: 18px; }
    .search-box {
      display: flex; align-items: center; gap: 10px; background: var(--card);
      border: 1px solid var(--line); border-radius: 12px; padding: 11px 15px;
    }
    .search-box svg { flex: none; opacity: .5; }
    .search-box input {
      border: none; background: transparent; outline: none; width: 100%;
      font-family: var(--mono); font-size: 14px; color: var(--ink);
    }
    .search-box input::placeholder { color: var(--muted); }

    /* ── Post list ── */
    ul.posts { list-style: none; padding: 0; margin: 0; }
    ul.posts li { border-bottom: 1px solid var(--line-soft); }
    ul.posts li a {
      display: flex; align-items: center; gap: 14px; padding: 12px 6px;
      transition: background .12s, padding-left .12s;
    }
    ul.posts li a:hover { background: var(--bg-2); padding-left: 12px; }
    /* 픽셀 썸네일 — assets/px/*.svg (pixel-icon 스킬로 생성) */
    ul.posts .p-thumb {
      flex: none; width: 62px; height: 62px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--bg-2);
      image-rendering: pixelated; display: block;
    }
    ul.posts .p-body { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    ul.posts .p-title {
      font-size: 15px; color: var(--ink); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    ul.posts .p-date { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    ul.posts li a:hover .p-title { text-decoration: underline; }
    @media (max-width: 560px) {
      ul.posts li a { gap: 11px; }
      ul.posts .p-thumb { width: 50px; height: 50px; }
      ul.posts .p-title { font-size: 14px; }
    }

    /* ── Pagination ── */
    .pager { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 26px; }
    .pager button {
      font-family: var(--mono); font-size: 12px; background: var(--card);
      border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px; cursor: pointer; color: var(--ink);
      transition: background .12s;
    }
    .pager button:hover:not(:disabled) { background: var(--bg-2); }
    .pager button:disabled { opacity: .4; cursor: default; }
    .pager button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .pager .pinfo { font-family: var(--mono); font-size: 12px; color: var(--muted); margin: 0 6px; }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--line); margin-top: 30px; padding: 32px 0 56px; }
    footer .f-inner { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; }
    footer .f-brand { font-family: var(--mono); font-size: 13px; }
    footer .f-meta { font-family: var(--mono); font-size: 11.5px; color: var(--muted); letter-spacing: 0.5px; }

    /* ── Reveal animation ── */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="#top" class="brand">tryingpig<span style="color:var(--muted)">.log</span></a>
      <nav class="nav-links">
        <a href="#projects">Projects</a>
        <a href="#study">Study</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="다크/라이트 전환" title="다크/라이트 전환">
          <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero wrap reveal">
      <div class="eyebrow">study log &amp; projects</div>
      <h1>study,<br>build,<br><span class="accent">repeat.</span></h1>
      <p class="lead">노력하는뚱땡이의 학습공간 — 투자·개발을 공부하며 남긴 기록과, 직접 만들어 운영 중인 프로젝트들을 모아둔 곳입니다.</p>
    </section>

    <section id="projects" class="sec wrap reveal">
      <div class="sec-head">
        <h2>Projects</h2>
        <span class="count" id="proj-count"></span>
      </div>
      <div class="cards" id="cards"><div class="empty">불러오는 중…</div></div>
    </section>

    <section id="study" class="sec wrap reveal">
      <div class="sec-head">
        <h2>Study &amp; Writings</h2>
        <span class="count" id="post-count"></span>
      </div>
      <div class="search-row">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="search posts… (제목 검색)" autocomplete="off" />
        </div>
      </div>
      <ul class="posts" id="posts"><li class="empty" style="border:none">불러오는 중…</li></ul>
      <div class="pager" id="pager"></div>
    </section>
  </main>

  <footer>
    <div class="wrap f-inner">
      <span class="f-brand">tryingpig.log</span>
      <span class="f-meta">노력하는뚱땡이의 학습공간 · built on GitHub Pages</span>
    </div>
  </footer>

  <script>
    const PER_PAGE = 20;

    /* ── Projects ── */
    (async function loadProjects() {
      const el = document.getElementById('cards');
      try {
        const projects = await fetch('projects.json?t=' + Date.now()).then(r => {
          if (!r.ok) throw new Error('no projects.json');
          return r.json();
        });
        document.getElementById('proj-count').textContent =
          String(projects.length).padStart(2, '0');
        if (!projects.length) { el.innerHTML = '<div class="empty">아직 등록된 프로젝트가 없습니다.</div>'; return; }
        el.innerHTML = projects.map(p => `
          <a class="card" href="${p.url}" target="_blank" rel="noopener">
            <div class="emoji">${p.emoji || '🔗'}</div>
            <div class="c-en">${p.name_en || p.name_ko || ''}</div>
            ${p.name_ko ? `<div class="c-ko">${p.name_ko}</div>` : ''}
            <div class="c-desc">${p.desc || ''}</div>
            <div class="c-foot">
              <span class="c-tag">${p.tag || 'project'}</span>
              <span class="c-go mono">↗</span>
            </div>
          </a>`).join('');
      } catch (e) {
        el.innerHTML = '<div class="empty">프로젝트 목록을 불러오지 못했습니다 (projects.json).</div>';
        document.getElementById('proj-count').textContent = '00';
      }
    })();

    /* ── Posts (search + pagination) ── */
    let allPosts = [];
    let filtered = [];
    let page = 1;

    function render() {
      const listEl = document.getElementById('posts');
      const pagerEl = document.getElementById('pager');
      const total = filtered.length;
      const pages = Math.max(1, Math.ceil(total / PER_PAGE));
      if (page > pages) page = pages;
      const start = (page - 1) * PER_PAGE;
      const slice = filtered.slice(start, start + PER_PAGE);

      if (!total) {
        listEl.innerHTML = '<li class="empty" style="border:none">검색 결과가 없습니다.</li>';
        pagerEl.innerHTML = '';
        return;
      }
      listEl.innerHTML = slice.map(p => `
        <li><a href="${p.file}" target="_blank" rel="noopener">
          <img class="p-thumb" src="${p.icon}" alt="" width="62" height="62" loading="lazy" />
          <span class="p-body">
            <span class="p-title">${p.title}</span>
            <span class="p-date">${p.date}</span>
          </span>
        </a></li>`).join('');

      // 페이지가 1개뿐이면 페이저 숨김
      if (pages <= 1) { pagerEl.innerHTML = ''; return; }
      let btns = '';
      btns += `<button ${page === 1 ? 'disabled' : ''} data-go="prev">← prev</button>`;
      for (let i = 1; i <= pages; i++) {
        btns += `<button class="${i === page ? 'active' : ''}" data-go="${i}">${i}</button>`;
      }
      btns += `<button ${page === pages ? 'disabled' : ''} data-go="next">next →</button>`;
      pagerEl.innerHTML = btns;
      pagerEl.querySelectorAll('button').forEach(b => {
        b.onclick = () => {
          const g = b.dataset.go;
          if (g === 'prev') page--;
          else if (g === 'next') page++;
          else page = Number(g);
          render();
          document.getElementById('study').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
      });
    }

    function applySearch(q) {
      q = q.trim().toLowerCase();
      filtered = q
        ? allPosts.filter(p => (p.title + ' ' + p.file).toLowerCase().includes(q))
        : allPosts.slice();
      page = 1;
      render();
    }

    /* ── 주제별 픽셀 아이콘 매핑 ──
       파일명으로 주제를 찾는다. 위에서부터 먼저 걸리는 규칙이 이김.
       새 주제를 추가하려면 assets/px/icons.json에 아이콘을 그려 pixel-icon 스킬로 뽑고
       여기에 한 줄 추가하면 된다. 못 찾으면 note(기본 문서 아이콘). */
    const TOPIC_ICONS = [
      [/보툴리눔톡신/, 'toxin'],
      [/휴젤/, 'hugel'],
      [/인텍플러스/, 'intekplus'],
      [/전력공조냉각/, 'cooling'],
      [/FCBGA/i, 'fcbga'],
      [/유리기판/, 'glass'],
      [/MLCC/i, 'mlcc'],
      [/삼성전기/, 'samsungsem'],
      [/SKT|데이터센터/i, 'datacenter'],
      [/효성중공업|SST/i, 'transformer'],
      [/메가프로젝트/, 'mega'],
      [/리밸런싱/, 'rebalance'],
      [/800VDC/i, 'vdc800'],
      [/_hbs_/i, 'hbs'],
      [/_hbf_/i, 'hbf'],
      [/_cpo_/i, 'cpo'],
      [/지스케일러|zscaler/i, 'zscaler'],
      [/AI에이전트/, 'aiagent'],
      [/대덕전자/, 'daeduk'],
      [/AI반도체|DSP|NPU/i, 'npu'],
      [/동국제약|마데카솔|더마코스메틱/, 'dongkook'],
    ];

    /* 매칭되는 주제가 없을 때 — 파일명 해시로 색과 무늬가 정해지는 픽셀 타일을 즉석 생성.
       좌우 대칭이라 아이덴티콘처럼 보이고, 글마다 색이 달라 회색 문서가 줄줄이 서지 않는다. */
    function autoIcon(seed) {
      let h = 2166136261;
      for (let i = 0; i < seed.length; i++) { h = Math.imul(h ^ seed.charCodeAt(i), 16777619); }
      let r = h >>> 0;
      const rnd = () => (r = Math.imul(r ^ (r >>> 15), 2246822507) >>> 0) / 4294967296;
      const hue = (h >>> 0) % 360;
      const fg = `hsl(${(hue + 8) % 360},70%,70%)`;

      let cells = '';
      for (let y = 3; y <= 12; y++) {
        for (let x = 3; x <= 7; x++) {
          if (rnd() > 0.45) {
            cells += `<rect x="${x}" y="${y}" width="1" height="1"/>`
                  +  `<rect x="${15 - x}" y="${y}" width="1" height="1"/>`;
          }
        }
      }
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">`
        + `<defs><linearGradient id="b" x1="0" y1="0" x2="1" y2="1">`
        + `<stop offset="0" stop-color="hsl(${hue},42%,13%)"/>`
        + `<stop offset="1" stop-color="hsl(${(hue + 28) % 360},46%,26%)"/></linearGradient></defs>`
        + `<rect width="16" height="16" fill="url(#b)"/><g fill="${fg}">${cells}</g></svg>`;
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    function decorate(post) {
      const f = post.file;
      const hit = TOPIC_ICONS.find(([re]) => re.test(f));
      post.icon = hit ? `assets/px/${hit[1]}.svg` : autoIcon(f);
    }

    (async function loadPosts() {
      const listEl = document.getElementById('posts');
      try {
        const posts = await fetch('posts.json?t=' + Date.now()).then(r => r.json());
        posts.forEach(decorate);
        // 각 글의 <title>을 병렬로 읽어옴 (기존 동작 유지, 단 병렬화로 빠르게)
        await Promise.all(posts.map(async (post) => {
          try {
            const html = await fetch(post.file).then(r => r.text());
            const m = html.match(/<title>(.*?)<\/title>/i);
            post.title = m ? m[1].trim() : post.file;
          } catch { post.title = post.file; }
        }));
        posts.sort((a, b) => b.date.localeCompare(a.date));
        allPosts = posts;
        filtered = posts.slice();
        document.getElementById('post-count').textContent =
          String(posts.length).padStart(2, '0');
        render();
      } catch (e) {
        listEl.innerHTML = '<li class="empty" style="border:none">아직 글이 없습니다.</li>';
        document.getElementById('post-count').textContent = '00';
      }
    })();

    document.getElementById('search').addEventListener('input', (e) => applySearch(e.target.value));

    /* ── Scroll reveal ── */
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    /* ── Theme toggle ── */
    (function () {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          try { localStorage.setItem('theme', 'light'); } catch (e) {}
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          try { localStorage.setItem('theme', 'dark'); } catch (e) {}
        }
      });
    })();
  </script>
</body>
</html>
