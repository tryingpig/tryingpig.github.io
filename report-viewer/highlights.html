<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>하이라이트 모아보기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">‹</a>
    <h1 id="title">모아보기</h1>
    <div class="spacer"></div>
    <button id="delBtn" class="danger-btn" disabled>삭제</button>
    <button id="copyBtn">전체 복사</button>
  </div>
  <div class="wrap">
    <div id="list"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const REPORT_ID = params.get("id");
    let HLS = [], TITLE = REPORT_ID, ANNO_SHA = null;
    const DELETED = new Set();

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function toast(m) {
      const t = document.getElementById("toast");
      t.textContent = m; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1600);
    }

    const SELECTED = new Set();

    function render() {
      const list = document.getElementById("list");
      if (!HLS.length) {
        list.innerHTML = `<div class="empty">아직 하이라이트가 없습니다.<br>뷰어에서 문장을 선택해 줄을 쳐보세요.</div>`;
        updateDelBtn();
        return;
      }
      const sorted = HLS.slice().sort((a, b) => a.page - b.page);
      list.innerHTML = sorted.map((h) => `
        <div class="hl-item ${esc(h.color || "yellow")}${SELECTED.has(h.hid) ? " sel" : ""}" data-hid="${esc(h.hid)}" data-page="${h.page}">
          <div class="hl-head">
            <input type="checkbox" class="hl-chk"${SELECTED.has(h.hid) ? " checked" : ""}>
            <span class="pg">p.${h.page}${(h.rects && h.rects.length) ? "" : " · 위치없음"}</span>
          </div>
          <div>${esc(h.text)}</div>
        </div>`).join("");
      list.querySelectorAll(".hl-item").forEach((it) => {
        const chk = it.querySelector(".hl-chk");
        chk.onclick = (e) => e.stopPropagation();
        chk.onchange = () => {
          const hid = it.dataset.hid;
          if (chk.checked) { SELECTED.add(hid); it.classList.add("sel"); }
          else { SELECTED.delete(hid); it.classList.remove("sel"); }
          updateDelBtn();
        };
        it.onclick = () => {
          location.href = `viewer.html?id=${encodeURIComponent(REPORT_ID)}&page=${it.dataset.page}`;
        };
      });
      updateDelBtn();
    }

    function updateDelBtn() {
      const n = SELECTED.size;
      const b = document.getElementById("delBtn");
      b.disabled = n === 0;
      b.textContent = n ? `삭제 (${n})` : "삭제";
    }

    async function saveList() {
      try {
        const res = await saveAnnotations(REPORT_ID, HLS, DELETED, ANNO_SHA);
        ANNO_SHA = res.sha;
        HLS = res.highlights;
        render();
        toast("삭제됨");
      } catch (err) { handleError(err, () => {}); }
    }

    document.getElementById("delBtn").onclick = async () => {
      if (!SELECTED.size) return;
      for (const hid of SELECTED) DELETED.add(hid);
      HLS = HLS.filter((h) => !SELECTED.has(h.hid));
      SELECTED.clear();
      render();
      await saveList();
    };

    async function load() {
      try {
        const [reportsDoc, anno] = await Promise.all([
          loadReports(), loadAnnotations(REPORT_ID),
        ]);
        const r = (reportsDoc.reports || []).find((x) => x.id === REPORT_ID);
        TITLE = r ? r.title : REPORT_ID;
        document.getElementById("title").textContent = TITLE;
        ANNO_SHA = anno.sha;
        HLS = anno.data.highlights || [];
        render();
      } catch (err) {
        handleError(err, load);
      }
    }

    document.getElementById("copyBtn").onclick = async () => {
      if (!HLS.length) return;
      const sorted = HLS.slice().sort((a, b) => a.page - b.page);
      const md = `# ${TITLE}\n\n` + sorted.map((h) => `> (p.${h.page}) ${h.text}`).join("\n\n");
      try { await navigator.clipboard.writeText(md); toast("복사됨"); }
      catch { toast("복사 실패"); }
    };

    requirePat(load);
  </script>
</body>
</html>
