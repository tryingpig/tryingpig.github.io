<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>하이라이트 모아보기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">‹</a>
    <h1 id="title">모아보기</h1>
    <div class="spacer"></div>
    <button id="delBtn">삭제</button>
    <button id="cancelBtn" style="display:none">취소</button>
    <button id="copyBtn">전체 복사</button>
  </div>
  <div class="wrap">
    <div class="hl-openmode">
      <span>열기 방식</span>
      <button class="seg" id="segRead">📖 읽기</button>
      <button class="seg" id="segPdf">📄 PDF</button>
    </div>
    <div id="list"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const REPORT_ID = params.get("id");
    let HLS = [], TITLE = REPORT_ID, ANNO_SHA = null;
    const DELETED = new Set();
    let OPEN_MODE = localStorage.getItem("rv_hl_open_mode") || "read";   // 하이라이트 클릭 시 열기 방식

    function renderSeg() {
      document.getElementById("segRead").classList.toggle("active", OPEN_MODE === "read");
      document.getElementById("segPdf").classList.toggle("active", OPEN_MODE === "pdf");
    }
    function setOpenMode(m) { OPEN_MODE = m; localStorage.setItem("rv_hl_open_mode", m); renderSeg(); }

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function toast(m) {
      const t = document.getElementById("toast");
      t.textContent = m; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1600);
    }

    const SELECTED = new Set();
    let delMode = false;

    function render() {
      const list = document.getElementById("list");
      if (!HLS.length) {
        list.innerHTML = `<div class="empty">아직 하이라이트가 없습니다.<br>뷰어에서 문장을 선택해 줄을 쳐보세요.</div>`;
        updateBar();
        return;
      }
      const sorted = HLS.slice().sort((a, b) => a.page - b.page);
      list.innerHTML = sorted.map((h) => {
        const body = (h.type === "image")
          ? `<div class="hl-img-wrap" data-hid="${esc(h.hid)}"><div class="hl-img-ph">🖼 이미지 불러오는 중…</div></div>`
          : `<div>${esc(h.text)}</div>`;
        const tag = (h.type === "image") ? ` · ✂️ 캡처` : "";
        return `
        <div class="hl-item ${esc(h.color || "yellow")}${delMode ? " selectable" : ""}${SELECTED.has(h.hid) ? " sel" : ""}" data-hid="${esc(h.hid)}" data-page="${h.page}">
          <div class="hl-head">
            ${delMode ? `<input type="checkbox" class="hl-chk"${SELECTED.has(h.hid) ? " checked" : ""}>` : ""}
            <span class="pg">p.${h.page}${tag}${(h.rects && h.rects.length) ? "" : " · 위치없음"}</span>
          </div>
          ${body}
        </div>`;
      }).join("");
      // 이미지 캡처는 vault에서 지연 로드
      for (const h of sorted) {
        if (h.type !== "image" || !h.clip) continue;
        fetchImageDataURL(h.clip).then((url) => {
          const el = list.querySelector(`.hl-img-wrap[data-hid="${h.hid}"]`);
          if (el) el.innerHTML = url ? `<img src="${url}" alt="캡처">` : `<div class="hl-img-ph">이미지 없음</div>`;
        }).catch(() => {});
      }
      list.querySelectorAll(".hl-item").forEach((it) => {
        it.onclick = () => {
          const hid = it.dataset.hid;
          if (delMode) {
            if (SELECTED.has(hid)) { SELECTED.delete(hid); it.classList.remove("sel"); }
            else { SELECTED.add(hid); it.classList.add("sel"); }
            const chk = it.querySelector(".hl-chk");
            if (chk) chk.checked = SELECTED.has(hid);
            updateBar();
          } else {
            const modeParam = OPEN_MODE === "pdf" ? "" : "&mode=read";
            location.href = `viewer.html?id=${encodeURIComponent(REPORT_ID)}`
              + `&hl=${encodeURIComponent(hid)}&page=${it.dataset.page}${modeParam}`;
          }
        };
      });
      updateBar();
    }

    /* 삭제/취소/복사 버튼 상태 갱신 */
    function updateBar() {
      const del = document.getElementById("delBtn");
      const cancel = document.getElementById("cancelBtn");
      const copy = document.getElementById("copyBtn");
      if (delMode) {
        cancel.style.display = "";
        copy.style.display = "none";
        del.classList.add("danger-btn");
        del.disabled = SELECTED.size === 0;
        del.textContent = SELECTED.size ? `삭제 (${SELECTED.size})` : "삭제";
      } else {
        cancel.style.display = "none";
        copy.style.display = "";
        del.classList.remove("danger-btn");
        del.disabled = false;
        del.textContent = "삭제";
      }
    }

    function setDelMode(on) {
      delMode = on;
      if (!on) SELECTED.clear();
      render();
    }

    async function saveList() {
      try {
        const res = await saveAnnotations(REPORT_ID, HLS, DELETED, ANNO_SHA);
        ANNO_SHA = res.sha;
        HLS = res.highlights;
        render();
        toast("삭제됨");
      } catch (err) { handleError(err, () => {}); }
    }

    document.getElementById("delBtn").onclick = async () => {
      if (!delMode) { setDelMode(true); return; }   // 1단계: 삭제 모드 진입(체크박스 표시)
      if (!SELECTED.size) return;                    // 2단계: 체크된 항목 삭제
      for (const hid of SELECTED) DELETED.add(hid);
      HLS = HLS.filter((h) => !SELECTED.has(h.hid));
      SELECTED.clear();
      delMode = false;
      render();
      await saveList();
    };
    document.getElementById("cancelBtn").onclick = () => setDelMode(false);

    async function load() {
      try {
        const [reportsDoc, anno] = await Promise.all([
          loadReports(), loadAnnotations(REPORT_ID),
        ]);
        const r = (reportsDoc.reports || []).find((x) => x.id === REPORT_ID);
        TITLE = r ? r.title : REPORT_ID;
        document.getElementById("title").textContent = TITLE;
        ANNO_SHA = anno.sha;
        HLS = anno.data.highlights || [];
        render();
      } catch (err) {
        handleError(err, load);
      }
    }

    document.getElementById("copyBtn").onclick = async () => {
      if (!HLS.length) return;
      const sorted = HLS.slice().sort((a, b) => a.page - b.page);
      const md = `# ${TITLE}\n\n` + sorted.map((h) =>
        `> (p.${h.page}) ${h.type === "image" ? "[이미지 캡처]" : h.text}`).join("\n\n");
      try { await navigator.clipboard.writeText(md); toast("복사됨"); }
      catch { toast("복사 실패"); }
    };

    document.getElementById("segRead").onclick = () => setOpenMode("read");
    document.getElementById("segPdf").onclick = () => setOpenMode("pdf");
    renderSeg();

    requirePat(load);
  </script>
</body>
</html>
