<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>리포트 마커</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <h1>📑 리포트 마커</h1>
    <div class="spacer"></div>
    <a class="btn-link" id="uploadLink" href="upload.html" title="PDF 등록">➕</a>
    <button id="delBtn">삭제</button>
    <button id="cancelBtn" style="display:none">취소</button>
    <button id="refreshBtn">새로고침</button>
    <button id="logoutBtn" title="토큰 삭제">⎋</button>
  </div>

  <div class="wrap">
    <div class="searchbar" id="searchbar">
      <input type="text" id="qTitle" class="s-input" placeholder="제목 검색">
      <select id="qBroker" class="s-input"><option value="">증권사 전체</option></select>
      <select id="qSector" class="s-input"><option value="">섹터 전체</option></select>
      <input type="date" id="qFrom" class="s-input s-date" title="발행일">
      <label class="s-chk"><input type="checkbox" id="qRange"> 종료일</label>
      <span class="s-tilde" id="qTilde" hidden>~</span>
      <input type="date" id="qTo" class="s-input s-date" title="발행일 종료" hidden>
      <label class="s-chk"><input type="checkbox" id="qHl"> ✏️ 하이라이트</label>
      <div class="spacer"></div>
      <select id="qSort" class="s-input" title="정렬 기준">
        <option value="pub">📅 발행일순</option>
        <option value="up">📥 수집순</option>
        <option value="hl">✏️ 하이라이트순</option>
        <option value="title">🔤 제목순</option>
      </select>
      <button id="resetBtn" class="s-reset">초기화</button>
      <button id="searchBtn" class="s-search">🔍 검색</button>
    </div>
    <div id="list"><div class="loading">불러오는 중…</div></div>
  </div>

  <div id="thumbHover" style="display:none"><img alt="미리보기"></div>
  <div id="thumbLightbox" style="display:none"><img alt="미리보기"></div>

  <script src="app.js"></script>
  <script>
    let ALL = [];
    let FILTER = { title: "", broker: "", sector: "", from: "", to: "", range: false, onlyHl: false };
    let SORT = "pub";   // pub=발행일 · up=수집순 · hl=하이라이트 · title=제목
    let delMode = false;
    const SELECTED = new Set();
    const HOVER_OK = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    /* ── 썸네일 미리보기 ── */
    function thumbSrc(id) {
      const cached = localStorage.getItem("rv_thumb_" + id);
      if (cached) return cached;
      const el = document.querySelector(`.card-thumb[data-thumb="${id}"] img`);
      return el ? el.src : null;
    }
    function showThumbHover(th, id) {
      const src = thumbSrc(id);
      if (!src) return;
      const box = document.getElementById("thumbHover");
      const img = box.querySelector("img");
      const place = () => {
        const r = th.getBoundingClientRect();
        const bw = box.offsetWidth, bh = box.offsetHeight;
        let left = r.right + 10;
        if (left + bw > window.innerWidth - 8) left = r.left - bw - 10;   // 넘치면 왼쪽으로
        if (left < 8) left = 8;
        const top = Math.max(8, Math.min(r.top + r.height / 2 - bh / 2, window.innerHeight - bh - 8));
        box.style.left = left + "px"; box.style.top = top + "px";
      };
      img.onload = place;
      img.src = src;
      box.style.display = "";
      place();
    }
    function hideThumbHover() { document.getElementById("thumbHover").style.display = "none"; }
    function openThumbLightbox(id) {
      const src = thumbSrc(id);
      if (!src) return;
      const lb = document.getElementById("thumbLightbox");
      lb.querySelector("img").src = src;
      lb.style.display = "";
    }

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    const cardDate = (r) => r.publish_date || (r.uploaded_at || "").slice(0, 10);

    /* 증권사·섹터 드롭다운을 현재 목록에 실제로 있는 값들로 채움(선택값 유지) */
    function renderSearchBar() {
      const sel = document.getElementById("qBroker");
      const brokers = [...new Set(ALL.map((r) => r.broker).filter(Boolean).filter((b) => b !== "미분류"))].sort();
      const hasNone = ALL.some((r) => !r.broker || r.broker === "미분류");
      const opts = [`<option value="">증권사 전체</option>`];
      if (hasNone) opts.push(`<option value="__none__">미분류</option>`);
      for (const b of brokers) opts.push(`<option value="${esc(b)}">${esc(b)}</option>`);
      sel.innerHTML = opts.join("");
      sel.value = FILTER.broker || "";

      const ssel = document.getElementById("qSector");
      const sectors = [...new Set(ALL.map((r) => r.sector).filter(Boolean))].sort();
      const sOpts = [`<option value="">섹터 전체</option>`];
      for (const s of sectors) sOpts.push(`<option value="${esc(s)}">${esc(s)}</option>`);
      ssel.innerHTML = sOpts.join("");
      ssel.value = FILTER.sector || "";
    }

    /* '종료일' 토글: 켜면 ~ 와 종료일 입력칸 표시(범위 검색), 끄면 단일 날짜 */
    function setRange(on) {
      document.getElementById("qTilde").hidden = !on;
      document.getElementById("qTo").hidden = !on;
      if (!on) document.getElementById("qTo").value = "";
    }

    function applySearch() {
      FILTER.title = document.getElementById("qTitle").value || "";
      FILTER.broker = document.getElementById("qBroker").value || "";
      FILTER.sector = document.getElementById("qSector").value || "";
      FILTER.from = document.getElementById("qFrom").value || "";
      FILTER.range = document.getElementById("qRange").checked;
      FILTER.to = FILTER.range ? (document.getElementById("qTo").value || "") : "";
      FILTER.onlyHl = document.getElementById("qHl").checked;
      renderList();
    }

    function resetSearch() {
      FILTER = { title: "", broker: "", sector: "", from: "", to: "", range: false, onlyHl: false };
      SORT = "pub";
      document.getElementById("qTitle").value = "";
      document.getElementById("qBroker").value = "";
      document.getElementById("qSector").value = "";
      document.getElementById("qFrom").value = "";
      document.getElementById("qTo").value = "";
      document.getElementById("qRange").checked = false;
      document.getElementById("qHl").checked = false;
      document.getElementById("qSort").value = "pub";
      setRange(false);
      renderList();
    }

    function renderList() {
      let rows = ALL.slice();
      const q = FILTER.title.trim().toLowerCase();
      if (q) rows = rows.filter((r) => (r.title || "").toLowerCase().includes(q));
      if (FILTER.broker === "__none__") rows = rows.filter((r) => !r.broker || r.broker === "미분류");
      else if (FILTER.broker) rows = rows.filter((r) => r.broker === FILTER.broker);
      if (FILTER.sector) rows = rows.filter((r) => r.sector === FILTER.sector);
      if (FILTER.range) {                       // 범위 검색
        if (FILTER.from) rows = rows.filter((r) => cardDate(r) >= FILTER.from);
        if (FILTER.to) rows = rows.filter((r) => cardDate(r) <= FILTER.to);
      } else if (FILTER.from) {                  // 단일 날짜 = 그 날 발행분만
        rows = rows.filter((r) => cardDate(r) === FILTER.from);
      }
      if (FILTER.onlyHl) rows = rows.filter((r) => (r.highlight_count || 0) > 0);

      const CMP = {
        pub: (a, b) => (cardDate(b) || "").localeCompare(cardDate(a) || "") ||
                       (b.uploaded_at || "").localeCompare(a.uploaded_at || ""),
        up: (a, b) => (b.uploaded_at || "").localeCompare(a.uploaded_at || ""),
        hl: (a, b) => ((b.highlight_count || 0) - (a.highlight_count || 0)) ||
                      (cardDate(b) || "").localeCompare(cardDate(a) || ""),
        title: (a, b) => (a.title || "").localeCompare(b.title || "", "ko"),
      };
      rows.sort(CMP[SORT] || CMP.pub);

      const list = document.getElementById("list");
      if (!rows.length) {
        list.innerHTML = `<div class="empty">표시할 리포트가 없습니다.</div>`;
        return;
      }
      list.innerHTML = rows.map((r) => {
        const sector = r.sector ? `<span class="badge sector">${esc(r.sector)}</span>` : "";
        const scan = r.has_text_layer === false ? `<span class="badge scan">스캔본</span>` : "";
        const pend = r.pending_deletion ? `<span class="badge del">🗑 삭제예정 ~${esc((r.delete_after || "").slice(5))}</span>` : "";
        const hl = (r.highlight_count || 0) > 0 ? `<span class="hl">✏️ ${r.highlight_count}</span>` : "";
        const dateStr = cardDate(r);
        const thumb = localStorage.getItem("rv_thumb_" + r.id);
        const thumbHtml = thumb ? `<img src="${thumb}" alt="">` : `📄`;
        const chk = delMode ? `<input type="checkbox" class="card-chk"${SELECTED.has(r.id) ? " checked" : ""}>` : "";
        return `
          <div class="card${delMode ? " selectable" : ""}${SELECTED.has(r.id) ? " sel" : ""}" data-id="${esc(r.id)}">
            ${chk}
            ${delMode ? "" : `<button class="card-del" title="삭제">×</button>`}
            <div class="card-thumb" data-thumb="${esc(r.id)}">${thumbHtml}</div>
            <div class="card-body">
              <div class="title">${esc(r.title)}</div>
              <div class="meta">
                <span class="badge">${esc(r.broker || "미분류")}</span>
                ${sector}${scan}${pend}
                <span>${esc(dateStr)}</span>
                <span>· ${r.size_mb ?? "?"}MB</span>
                <span class="engine" title="본문 추출: ${r.text_engine === "llm" ? "AI(LLM)" : "휴리스틱"}">${r.text_engine === "llm" ? "🤖" : "🧑"}</span>
              </div>
              <div class="row2">
                ${hl}<div class="spacer"></div>
                <a class="mini read" href="viewer.html?id=${encodeURIComponent(r.id)}&mode=read">📖 읽기</a>
                <a class="mini pdf" href="viewer.html?id=${encodeURIComponent(r.id)}">📄 PDF</a>
                <a class="mini" href="highlights.html?id=${encodeURIComponent(r.id)}">모아보기</a>
                <a class="mini" href="edit.html?id=${encodeURIComponent(r.id)}">⚙️ 수정</a>
              </div>
            </div>
          </div>`;
      }).join("");

      list.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest(".card-del")) {   // 카드 우상단 X → 바로 삭제
            e.stopPropagation();
            const id = card.dataset.id;
            const r = ALL.find((x) => x.id === id);
            if (confirm(`"${(r && r.title) || id}" 리포트를 삭제할까요?\n하이라이트·캡처도 함께 삭제됩니다. (Notion 기록은 보존)`)) {
              deleteReports([id]);
            }
            return;
          }
          if (delMode) {                       // 삭제 모드: 카드 탭 = 선택 토글
            const id = card.dataset.id;
            if (SELECTED.has(id)) SELECTED.delete(id); else SELECTED.add(id);
            card.classList.toggle("sel", SELECTED.has(id));
            const c = card.querySelector(".card-chk"); if (c) c.checked = SELECTED.has(id);
            updateDelBar();
            return;
          }
          if (e.target.closest("a")) return;           // 읽기/PDF/모아보기/수정 링크는 예외
          if (e.target.closest(".card-thumb")) return; // 썸네일 = 미리보기(별도 처리)
          // 그냥 탭 → 이동하지 않고 '선택됨' 표시만 토글(단일 선택)
          const wasActive = card.classList.contains("active");
          list.querySelectorAll(".card.active").forEach((c) => c.classList.remove("active"));
          if (!wasActive) card.classList.add("active");
        });
      });

      // 썸네일 미리보기: 데스크톱은 호버, 모바일은 탭(라이트박스)
      list.querySelectorAll(".card-thumb").forEach((th) => {
        const id = th.dataset.thumb;
        if (HOVER_OK) {
          th.addEventListener("mouseenter", () => { if (!delMode) showThumbHover(th, id); });
          th.addEventListener("mouseleave", hideThumbHover);
        }
        th.addEventListener("click", (e) => {
          if (delMode) return;   // 삭제 모드에선 카드 선택 토글로 넘김(가로채지 않음)
          e.stopPropagation(); hideThumbHover(); openThumbLightbox(id);
        });
      });

      // 캐시에 없는 썸네일은 vault(index/thumbs)에서 지연 로드
      for (const r of rows) {
        if (localStorage.getItem("rv_thumb_" + r.id) || !r.thumb) continue;
        loadThumb(r).then((url) => {
          if (!url) return;
          const el = list.querySelector(`.card-thumb[data-thumb="${r.id}"]`);
          if (el) el.innerHTML = `<img src="${url}" alt="">`;
        });
      }
    }

    function blobToDataURL(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(blob);
      });
    }

    /* 서버 썸네일(index/thumbs/<id>.jpg)을 GitHub API로 받아 localStorage에 캐시 */
    async function loadThumb(r) {
      try {
        const res = await ghFetch("contents/" + r.thumb, { accept: "application/vnd.github.raw" });
        if (!res.ok) return null;
        const dataUrl = await blobToDataURL(await res.blob());
        try { localStorage.setItem("rv_thumb_" + r.id, dataUrl); } catch (e) { /* 용량초과 무시 */ }
        return dataUrl;
      } catch (e) { return null; }
    }

    async function load() {
      document.getElementById("list").innerHTML = `<div class="loading">불러오는 중…</div>`;
      try {
        const doc = await loadReports();
        ALL = doc.reports || [];
        renderSearchBar();
        renderList();
      } catch (err) {
        handleError(err, load);
      }
    }

    function updateDelBar() {
      const del = document.getElementById("delBtn");
      const cancel = document.getElementById("cancelBtn");
      const refresh = document.getElementById("refreshBtn");
      if (delMode) {
        cancel.style.display = ""; refresh.style.display = "none";
        del.classList.add("danger-btn");
        del.disabled = SELECTED.size === 0;
        del.textContent = SELECTED.size ? `삭제 (${SELECTED.size})` : "삭제";
      } else {
        cancel.style.display = "none"; refresh.style.display = "";
        del.classList.remove("danger-btn");
        del.disabled = false; del.textContent = "삭제";
      }
    }

    function setDelMode(on) {
      delMode = on;
      if (!on) SELECTED.clear();
      updateDelBar();
      renderList();
    }

    /* 선택 리포트를 reports.json에서 제거(+deleted 목록에 기록 → 서버 prune이 파일 정리).
       sha 충돌 시 최신 재조회 후 재시도. */
    async function deleteReports(ids) {
      const del = document.getElementById("delBtn");
      del.disabled = true; del.textContent = "삭제 중…";
      try {
        for (let attempt = 0; attempt < 3; attempt++) {
          const res = await ghFetch("contents/index/reports.json", { cache: "no-store" });
          if (!res.ok) throw new Error("목록 로드 실패: " + res.status);
          const obj = await res.json();
          const doc = JSON.parse(decodeB64Utf8(obj.content));
          doc.reports = (doc.reports || []).filter((r) => !ids.includes(r.id));
          doc.deleted = Array.from(new Set([...(doc.deleted || []), ...ids]));  // 서버 파일 정리 힌트
          const put = await ghFetch("contents/index/reports.json", {
            method: "PUT",
            body: {
              message: `delete: ${ids.length} report(s)`,
              content: encodeUtf8B64(JSON.stringify(doc, null, 2)),
              sha: obj.sha,
            },
          });
          if (put.ok) break;
          if (put.status !== 409 && put.status !== 422) throw new Error("삭제 실패: " + put.status);
        }
        ids.forEach((id) => localStorage.removeItem("rv_thumb_" + id));
        ALL = ALL.filter((r) => !ids.includes(r.id));
        setDelMode(false);
      } catch (err) {
        updateDelBar();
        handleError(err, () => {});
      }
    }

    document.getElementById("delBtn").onclick = async () => {
      if (!delMode) { setDelMode(true); return; }          // 1단계: 삭제 모드 진입
      if (!SELECTED.size) return;                            // 2단계: 확인 후 삭제
      const ids = [...SELECTED];
      if (!confirm(`${ids.length}개 리포트를 삭제할까요?\n하이라이트·캡처도 함께 삭제됩니다. (Notion 기록은 보존)`)) return;
      await deleteReports(ids);
    };
    document.getElementById("cancelBtn").onclick = () => setDelMode(false);

    document.getElementById("searchBtn").onclick = applySearch;
    document.getElementById("resetBtn").onclick = resetSearch;
    document.getElementById("qSort").addEventListener("change", (e) => {
      SORT = e.target.value; renderList();     // 정렬은 선택 즉시 반영
    });
    document.getElementById("qTitle").addEventListener("keydown", (e) => {
      if (e.key === "Enter") applySearch();
    });
    document.getElementById("qRange").addEventListener("change", (e) => {
      setRange(e.target.checked);              // 종료일 토글 → 종료일 칸 표시/숨김
    });

    document.getElementById("refreshBtn").onclick = load;
    document.getElementById("logoutBtn").onclick = () => {
      if (confirm("이 기기에서 토큰을 삭제할까요?")) { clearPat(); location.reload(); }
    };

    document.getElementById("thumbLightbox").onclick = () => {
      document.getElementById("thumbLightbox").style.display = "none";
    };
    window.addEventListener("scroll", hideThumbHover, { passive: true });

    requirePat(load);
  </script>
</body>
</html>
