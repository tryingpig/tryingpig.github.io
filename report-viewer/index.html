<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbfaf7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101216" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <title>리포트 마커</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="style.css?v=19">
</head>
<body>
  <div class="topbar">
    <div class="brand"><i data-lucide="bookmark"></i><span>리포트 마커</span><span class="count num" id="count"></span></div>
    <div class="spacer"></div>
    <a class="btn btn-ink" id="uploadLink" href="upload.html" title="PDF 등록"><i data-lucide="plus"></i><span class="btn-txt">등록</span></a>
    <button class="btn" id="delBtn"><span class="btn-txt">삭제</span></button>
    <button class="btn" id="cancelBtn" style="display:none"><span class="btn-txt">취소</span></button>
    <button class="btn icon-only" id="refreshBtn" title="새로고침" aria-label="새로고침"><i data-lucide="refresh-cw"></i></button>
    <button class="btn icon-only" id="logoutBtn" title="토큰 삭제" aria-label="토큰 삭제"><i data-lucide="log-out"></i></button>
  </div>

  <div class="wrap">
    <div class="searchbar collapsed" id="searchbar">
      <div class="s-search-wrap">
        <i data-lucide="search"></i>
        <input type="text" id="qTitle" class="s-input" placeholder="제목 검색">
      </div>
      <button id="filterToggle" class="chip filter-toggle" type="button"><i data-lucide="sliders-horizontal"></i>필터</button>
      <select id="qBroker" class="s-input chip-select"><option value="">증권사 전체</option></select>
      <select id="qSector" class="s-input chip-select"><option value="">섹터 전체</option></select>
      <input type="date" id="qFrom" class="s-input s-date" title="발행일">
      <label class="s-chk"><input type="checkbox" id="qRange"> 종료일</label>
      <span class="s-tilde" id="qTilde" hidden>~</span>
      <input type="date" id="qTo" class="s-input s-date" title="발행일 종료" hidden>
      <label class="chip chip-toggle" id="qHlChip"><input type="checkbox" id="qHl"><i data-lucide="highlighter"></i>하이라이트</label>
      <label class="chip chip-toggle" id="qFavChip"><input type="checkbox" id="qFav"><i data-lucide="star"></i>즐겨찾기</label>
      <button id="resetBtn" class="reset">초기화</button>
      <div class="spacer"></div>
      <button id="searchBtn" class="btn btn-ink s-search"><i data-lucide="search"></i><span class="btn-txt">검색</span></button>
      <div class="seg" id="sortSeg">
        <button data-sort="pub" class="on">발행일</button>
        <button data-sort="up">수집순</button>
        <button data-sort="hl">하이라이트</button>
        <button data-sort="title">제목</button>
      </div>
    </div>
    <div id="list"><div class="loading">불러오는 중…</div></div>
  </div>

  <div id="thumbHover" style="display:none"><img alt="미리보기"></div>
  <div class="toast" id="toast"></div>

  <script src="app.js?v=18"></script>
  <script>
    let ALL = [];
    /* 텔레그램 로고 (원+비행기 각각 칠함 → 전송 후 둘 다 회색으로 바뀌게. CSS .tg-disc/.tg-plane) */
    const TG_SVG = '<svg viewBox="0 0 512 512" aria-hidden="true">'
      + '<circle class="tg-disc" cx="256" cy="256" r="256"/>'
      + '<path class="tg-plane" transform="translate(96 86) scale(0.68)" d="M446.7 98.6l-67.6 318.8c-5.1 22.5-18.4 28.1-37.3 17.5l-103-75.9-49.7 47.8c-5.5 5.5-10.1 10.1-20.7 10.1l7.4-104.9 190.9-172.5c8.3-7.4-1.8-11.5-12.9-4.1L117.8 284 16.2 252.2c-22.1-6.9-22.5-22.1 4.6-32.7L418.2 66.4c18.4-6.8 34.5 4.4 28.5 32.2z"/></svg>';
    /* 전송됨 표시: 동그라미 X (아이콘 자체를 통째로 교체) */
    const SENT_SVG = '<svg viewBox="0 0 512 512" aria-hidden="true">'
      + '<circle cx="256" cy="256" r="256" fill="#9aa3af"/>'
      + '<path d="M176 176 L336 336 M336 176 L176 336" stroke="#fff" stroke-width="52" stroke-linecap="round" fill="none"/></svg>';
    let FILTER = { title: "", broker: "", sector: "", from: "", to: "", range: false, onlyHl: false, onlyFav: false };
    let SORT = "pub";   // pub=발행일 · up=수집순 · hl=하이라이트 · title=제목
    let delMode = false;
    const SELECTED = new Set();
    const HOVER_OK = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    /* ── 썸네일 미리보기 ── */
    function thumbSrc(id) {
      const cached = localStorage.getItem("rv_thumb_" + id);
      if (cached) return cached;
      const el = document.querySelector(`.card-thumb[data-thumb="${id}"] img`);
      return el ? el.src : null;
    }
    function showThumbHover(th, id) {
      const src = thumbSrc(id);
      if (!src) return;
      const box = document.getElementById("thumbHover");
      const img = box.querySelector("img");
      const place = () => {
        const r = th.getBoundingClientRect();
        const bw = box.offsetWidth, bh = box.offsetHeight;
        let left = r.right + 10;
        if (left + bw > window.innerWidth - 8) left = r.left - bw - 10;   // 넘치면 왼쪽으로
        if (left < 8) left = 8;
        const top = Math.max(8, Math.min(r.top + r.height / 2 - bh / 2, window.innerHeight - bh - 8));
        box.style.left = left + "px"; box.style.top = top + "px";
      };
      img.onload = place;
      img.src = src;
      box.dataset.for = id;
      box.style.display = "";
      place();
    }
    function hideThumbHover() {
      const box = document.getElementById("thumbHover");
      box.style.display = "none";
      box.dataset.for = "";
    }

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function toast(m) {
      const t = document.getElementById("toast");
      t.textContent = m; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    /* 카드 텔레그램 버튼: 확인 → 전송 → 회색 처리. 이미 보낸 리포트는 재확인. */
    async function sendCardToTelegram(id, btn) {
      const r = ALL.find((x) => x.id === id);
      if (!r) return;
      const already = isTgSent(id);
      const msg = already
        ? `"${r.title || id}"\n이미 텔레그램으로 보낸 리포트입니다. 다시 보낼까요?`
        : `"${r.title || id}"\n하이라이트를 텔레그램으로 보낼까요?`;
      if (!confirm(msg)) return;
      requireTg(async () => {
        if (btn.dataset.busy) return;
        btn.dataset.busy = "1";
        // ① 누르는 즉시 아이콘을 동그라미 X로 교체(낙관적) — 전송은 뒤에서 처리
        markTgSent(id);
        btn.classList.add("sent");
        btn.innerHTML = SENT_SVG;
        toast("전송 중…");
        try {
          const res = await tgSendReport(r);   // best-effort: 부분 실패는 res.failed로만
          toast(res.failed
            ? `보냈어요 · 일부 ${res.failed}건 실패(다시 눌러 재전송 가능)`
            : `텔레그램으로 보냈어요 (텍스트 ${res.texts}·이미지 ${res.images})`);
          // 부분 실패든 성공이든 X 유지(한번 누르면 계속 X)
        } catch (err) {
          // 여기까지 오면 인증오류(토큰) = 아무것도 못 보냄 → 그때만 원래대로 되돌리고 토큰 재입력
          console.error(err);
          unmarkTgSent(id);
          btn.classList.remove("sent");
          btn.innerHTML = TG_SVG;
          toast(err.message || "전송 실패");
          if (err instanceof TgError && /토큰|chat_id/.test(err.message)) {
            clearTgCreds(); showTgOverlay(() => sendCardToTelegram(id, btn));
          }
        } finally {
          delete btn.dataset.busy;
        }
      });
    }

    const cardDate = (r) => r.publish_date || (r.uploaded_at || "").slice(0, 10);

    /* 증권사·섹터 드롭다운을 현재 목록에 실제로 있는 값들로 채움(선택값 유지) */
    function renderSearchBar() {
      const sel = document.getElementById("qBroker");
      const brokers = [...new Set(ALL.map((r) => r.broker).filter(Boolean).filter((b) => b !== "미분류"))].sort();
      const hasNone = ALL.some((r) => !r.broker || r.broker === "미분류");
      const opts = [`<option value="">증권사 전체</option>`];
      if (hasNone) opts.push(`<option value="__none__">미분류</option>`);
      for (const b of brokers) opts.push(`<option value="${esc(b)}">${esc(b)}</option>`);
      sel.innerHTML = opts.join("");
      sel.value = FILTER.broker || "";

      const ssel = document.getElementById("qSector");
      const sectors = [...new Set(ALL.map((r) => r.sector).filter(Boolean))].sort();
      const sOpts = [`<option value="">섹터 전체</option>`];
      for (const s of sectors) sOpts.push(`<option value="${esc(s)}">${esc(s)}</option>`);
      ssel.innerHTML = sOpts.join("");
      ssel.value = FILTER.sector || "";
    }

    /* '종료일' 토글: 켜면 ~ 와 종료일 입력칸 표시(범위 검색), 끄면 단일 날짜 */
    function setRange(on) {
      document.getElementById("qTilde").hidden = !on;
      document.getElementById("qTo").hidden = !on;
      if (!on) document.getElementById("qTo").value = "";
    }

    function applySearch() {
      FILTER.title = document.getElementById("qTitle").value || "";
      FILTER.broker = document.getElementById("qBroker").value || "";
      FILTER.sector = document.getElementById("qSector").value || "";
      FILTER.from = document.getElementById("qFrom").value || "";
      FILTER.range = document.getElementById("qRange").checked;
      FILTER.to = FILTER.range ? (document.getElementById("qTo").value || "") : "";
      FILTER.onlyHl = document.getElementById("qHl").checked;
      FILTER.onlyFav = document.getElementById("qFav").checked;
      renderList();
    }

    function resetSearch() {
      FILTER = { title: "", broker: "", sector: "", from: "", to: "", range: false, onlyHl: false, onlyFav: false };
      SORT = "pub";
      document.getElementById("qTitle").value = "";
      document.getElementById("qBroker").value = "";
      document.getElementById("qSector").value = "";
      document.getElementById("qFrom").value = "";
      document.getElementById("qTo").value = "";
      document.getElementById("qRange").checked = false;
      document.getElementById("qHl").checked = false;
      document.getElementById("qFav").checked = false;
      document.querySelectorAll("#sortSeg button").forEach((x) => x.classList.toggle("on", x.dataset.sort === "pub"));
      setRange(false);
      renderList();
    }

    function renderList() {
      let rows = ALL.slice();
      const q = FILTER.title.trim().toLowerCase();
      if (q) rows = rows.filter((r) => (r.title || "").toLowerCase().includes(q));
      if (FILTER.broker === "__none__") rows = rows.filter((r) => !r.broker || r.broker === "미분류");
      else if (FILTER.broker) rows = rows.filter((r) => r.broker === FILTER.broker);
      if (FILTER.sector) rows = rows.filter((r) => r.sector === FILTER.sector);
      if (FILTER.range) {                       // 범위 검색
        if (FILTER.from) rows = rows.filter((r) => cardDate(r) >= FILTER.from);
        if (FILTER.to) rows = rows.filter((r) => cardDate(r) <= FILTER.to);
      } else if (FILTER.from) {                  // 단일 날짜 = 그 날 발행분만
        rows = rows.filter((r) => cardDate(r) === FILTER.from);
      }
      if (FILTER.onlyHl) rows = rows.filter((r) => (r.highlight_count || 0) > 0);
      if (FILTER.onlyFav) rows = rows.filter((r) => isBookmarked(r.id));

      const CMP = {
        pub: (a, b) => (cardDate(b) || "").localeCompare(cardDate(a) || "") ||
                       (b.uploaded_at || "").localeCompare(a.uploaded_at || ""),
        up: (a, b) => (b.uploaded_at || "").localeCompare(a.uploaded_at || ""),
        hl: (a, b) => ((b.highlight_count || 0) - (a.highlight_count || 0)) ||
                      (cardDate(b) || "").localeCompare(cardDate(a) || ""),
        title: (a, b) => (a.title || "").localeCompare(b.title || "", "ko"),
      };
      rows.sort(CMP[SORT] || CMP.pub);

      const list = document.getElementById("list");
      if (!rows.length) {
        list.innerHTML = `<div class="empty">표시할 리포트가 없습니다.</div>`;
        return;
      }
      const dayLabel = (d) => (d || "").replace(/-/g, ". ");   // 2026-07-17 → 2026. 07. 17
      const cardHtml = (r) => {
        const marked = (r.highlight_count || 0) > 0;
        const sector = r.sector ? `<span class="tag">${esc(r.sector)}</span>` : "";
        const scan = r.has_text_layer === false ? `<span class="tag warn">스캔본</span>` : "";
        const pend = r.pending_deletion ? `<span class="tag warn">🗑 삭제예정 ~${esc((r.delete_after || "").slice(5))}</span>` : "";
        const hlChip = marked ? `<span class="tag tag-hl"><i data-lucide="highlighter"></i><span class="num">${r.highlight_count}</span></span>` : "";
        const pages = r.pages ? `<span class="pages num">${r.pages}p</span>` : "";
        // 휴리스틱 품질 낮으면 'AI 추출 추천'(이미 LLM으로 뽑은 건 제외)
        const llmSug = (r.llm_suggested && r.text_engine !== "llm")
          ? ` <span class="llm-sug" title="휴리스틱 본문 추출 품질이 낮아 보임 → AI(LLM) 재추출 추천${(r.heur_flags && r.heur_flags.length) ? " · " + r.heur_flags.map(esc).join(", ") : ""}">🤖 추천</span>`
          : "";
        const thumb = localStorage.getItem("rv_thumb_" + r.id);
        const thumbHtml = thumb ? `<img src="${thumb}" alt="">` : `<i data-lucide="file-text"></i>`;
        const fav = isBookmarked(r.id);
        const readUrl = `viewer.html?id=${encodeURIComponent(r.id)}&mode=read`;
        const chk = delMode ? `<input type="checkbox" class="card-chk"${SELECTED.has(r.id) ? " checked" : ""}>` : "";
        const tg = marked ? `<button class="act tg-send${isTgSent(r.id) ? " sent" : ""}" data-id="${esc(r.id)}" title="${isTgSent(r.id) ? "이미 텔레그램으로 보냄 · 다시 보내기" : "하이라이트를 텔레그램으로 보내기"}" aria-label="텔레그램으로 보내기">${isTgSent(r.id) ? SENT_SVG : TG_SVG}</button>` : "";
        return `
          <article class="card${marked ? " marked" : ""}${delMode ? " selectable" : ""}${SELECTED.has(r.id) ? " sel" : ""}" data-id="${esc(r.id)}" data-read="${readUrl}">
            ${chk}
            <div class="card-thumb" data-thumb="${esc(r.id)}">${thumbHtml}</div>
            <div class="body">
              <div class="row1">
                <h3 class="title">${esc(r.title)}</h3>
                <button class="star${fav ? " on" : ""}" data-id="${esc(r.id)}" title="${fav ? "즐겨찾기 해제" : "즐겨찾기에 추가"}" aria-label="즐겨찾기"><i data-lucide="star"></i></button>
              </div>
              <p class="meta">${esc(r.broker || "미분류")}<span>·</span>${esc(cardDate(r))}<span>·</span>${r.size_mb ?? "?"}MB${llmSug}</p>
              <div class="tags">
                ${sector}${scan}${pend}${hlChip}${pages}
                <div class="acts">
                  <a class="act" href="viewer.html?id=${encodeURIComponent(r.id)}" title="PDF로 보기" aria-label="PDF"><i data-lucide="file"></i></a>
                  <a class="act" href="highlights.html?id=${encodeURIComponent(r.id)}" title="하이라이트 모아보기" aria-label="모아보기"><i data-lucide="list"></i></a>
                  ${tg}
                  <a class="act" href="edit.html?id=${encodeURIComponent(r.id)}" title="수정" aria-label="수정"><i data-lucide="settings-2"></i></a>
                  ${delMode ? "" : `<button class="act card-del" title="삭제" aria-label="삭제"><i data-lucide="trash-2"></i></button>`}
                </div>
              </div>
            </div>
          </article>`;
      };
      let html = "", lastDay = null;
      for (const r of rows) {
        if (SORT === "pub") {
          const d = cardDate(r);
          if (d !== lastDay) { lastDay = d; html += `<div class="day num">${esc(dayLabel(d))}</div>`; }
        }
        html += cardHtml(r);
      }
      list.innerHTML = html;
      if (window.lucide) lucide.createIcons();

      list.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("click", (e) => {
          const star = e.target.closest(".star");
          if (star) {                             // ⭐ 즐겨찾기 토글(낙관적)
            e.stopPropagation();
            if (delMode) return;
            const on = toggleBookmark(star.dataset.id);
            star.classList.toggle("on", on);
            star.title = on ? "즐겨찾기 해제" : "즐겨찾기에 추가";
            if (FILTER.onlyFav && !on) renderList();
            return;
          }
          const tgBtn = e.target.closest(".tg-send");
          if (tgBtn) {                            // 텔레그램 전송 버튼
            e.stopPropagation();
            if (delMode) return;
            sendCardToTelegram(tgBtn.dataset.id, tgBtn);
            return;
          }
          if (e.target.closest(".card-del")) {   // 삭제
            e.stopPropagation();
            const id = card.dataset.id;
            const r = ALL.find((x) => x.id === id);
            if (confirm(`"${(r && r.title) || id}" 리포트를 삭제할까요?\n하이라이트·캡처도 함께 삭제됩니다. (Notion 기록은 보존)`)) {
              deleteReports([id]);
            }
            return;
          }
          if (delMode) {                       // 삭제 모드: 카드 탭 = 선택 토글
            const id = card.dataset.id;
            if (SELECTED.has(id)) SELECTED.delete(id); else SELECTED.add(id);
            card.classList.toggle("sel", SELECTED.has(id));
            const c = card.querySelector(".card-chk"); if (c) c.checked = SELECTED.has(id);
            updateDelBar();
            return;
          }
          if (e.target.closest("a, .card-thumb")) return;   // 링크·썸네일은 각자 동작
          // 카드 본문 클릭 → 읽기 모드로 이동
          if (card.dataset.read) location.href = card.dataset.read;
        });
      });

      // 썸네일 미리보기: 데스크톱은 호버, 모바일은 탭(라이트박스)
      list.querySelectorAll(".card-thumb").forEach((th) => {
        const id = th.dataset.thumb;
        if (HOVER_OK) {
          th.addEventListener("mouseenter", () => { if (!delMode) showThumbHover(th, id); });
          th.addEventListener("mouseleave", hideThumbHover);
        }
        th.addEventListener("click", (e) => {
          if (delMode) return;   // 삭제 모드에선 카드 선택 토글로 넘김(가로채지 않음)
          e.stopPropagation();
          const box = document.getElementById("thumbHover");
          // 같은 썸네일을 다시 탭하면 닫기(토글), 아니면 미리보기 표시
          if (box.style.display !== "none" && box.dataset.for === id) hideThumbHover();
          else showThumbHover(th, id);
        });
      });

      // 캐시에 없는 썸네일은 vault(index/thumbs)에서 지연 로드
      for (const r of rows) {
        if (localStorage.getItem("rv_thumb_" + r.id) || !r.thumb) continue;
        loadThumb(r).then((url) => {
          if (!url) return;
          const el = list.querySelector(`.card-thumb[data-thumb="${r.id}"]`);
          if (el) el.innerHTML = `<img src="${url}" alt="">`;
        });
      }
    }

    function blobToDataURL(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(blob);
      });
    }

    /* 서버 썸네일(index/thumbs/<id>.jpg)을 GitHub API로 받아 localStorage에 캐시 */
    async function loadThumb(r) {
      try {
        const res = await ghFetch("contents/" + r.thumb, { accept: "application/vnd.github.raw" });
        if (!res.ok) return null;
        const dataUrl = await blobToDataURL(await res.blob());
        try { localStorage.setItem("rv_thumb_" + r.id, dataUrl); } catch (e) { /* 용량초과 무시 */ }
        return dataUrl;
      } catch (e) { return null; }
    }

    async function load() {
      document.getElementById("list").innerHTML = `<div class="loading">불러오는 중…</div>`;
      try {
        const doc = await loadReports();
        ALL = doc.reports || [];
        const cEl = document.getElementById("count"); if (cEl) cEl.textContent = ALL.length;
        renderSearchBar();
        renderList();                                   // 캐시 기준 즉시 표시
        fetchTgSentShared().then(() => renderList());   // vault 공유 전송이력 받아 X 표시 갱신
        fetchBookmarksShared().then(() => renderList()); // vault 공유 즐겨찾기 받아 ★ 표시 갱신
      } catch (err) {
        handleError(err, load);
      }
    }

    function updateDelBar() {
      const del = document.getElementById("delBtn");
      const cancel = document.getElementById("cancelBtn");
      const refresh = document.getElementById("refreshBtn");
      if (delMode) {
        cancel.style.display = ""; refresh.style.display = "none";
        del.classList.add("danger-btn");
        del.disabled = SELECTED.size === 0;
        del.textContent = SELECTED.size ? `삭제 (${SELECTED.size})` : "삭제";
      } else {
        cancel.style.display = "none"; refresh.style.display = "";
        del.classList.remove("danger-btn");
        del.disabled = false; del.textContent = "삭제";
      }
    }

    function setDelMode(on) {
      delMode = on;
      if (!on) SELECTED.clear();
      updateDelBar();
      renderList();
    }

    /* 선택 리포트를 reports.json에서 제거(+deleted 목록에 기록 → 서버 prune이 파일 정리).
       sha 충돌 시 최신 재조회 후 재시도. */
    async function deleteReports(ids) {
      const del = document.getElementById("delBtn");
      del.disabled = true; del.textContent = "삭제 중…";
      try {
        for (let attempt = 0; attempt < 3; attempt++) {
          const res = await ghFetch("contents/index/reports.json", { cache: "no-store" });
          if (!res.ok) throw new Error("목록 로드 실패: " + res.status);
          const obj = await res.json();
          const doc = JSON.parse(decodeB64Utf8(obj.content));
          doc.reports = (doc.reports || []).filter((r) => !ids.includes(r.id));
          doc.deleted = Array.from(new Set([...(doc.deleted || []), ...ids]));  // 서버 파일 정리 힌트
          const put = await ghFetch("contents/index/reports.json", {
            method: "PUT",
            body: {
              message: `delete: ${ids.length} report(s)`,
              content: encodeUtf8B64(JSON.stringify(doc, null, 2)),
              sha: obj.sha,
            },
          });
          if (put.ok) break;
          if (put.status !== 409 && put.status !== 422) throw new Error("삭제 실패: " + put.status);
        }
        ids.forEach((id) => localStorage.removeItem("rv_thumb_" + id));
        ALL = ALL.filter((r) => !ids.includes(r.id));
        setDelMode(false);
      } catch (err) {
        updateDelBar();
        handleError(err, () => {});
      }
    }

    document.getElementById("delBtn").onclick = async () => {
      if (!delMode) { setDelMode(true); return; }          // 1단계: 삭제 모드 진입
      if (!SELECTED.size) return;                            // 2단계: 확인 후 삭제
      const ids = [...SELECTED];
      if (!confirm(`${ids.length}개 리포트를 삭제할까요?\n하이라이트·캡처도 함께 삭제됩니다. (Notion 기록은 보존)`)) return;
      await deleteReports(ids);
    };
    document.getElementById("cancelBtn").onclick = () => setDelMode(false);

    document.getElementById("searchBtn").onclick = applySearch;
    document.getElementById("resetBtn").onclick = resetSearch;
    // 모바일: 필터 접기/펼치기 토글
    document.getElementById("filterToggle").onclick = () => {
      const sb = document.getElementById("searchbar");
      const open = sb.classList.toggle("collapsed") === false;
      document.getElementById("filterToggle").classList.toggle("on", open);
    };
    // 정렬 세그먼트: 클릭 즉시 반영
    document.querySelectorAll("#sortSeg button").forEach((b) => {
      b.addEventListener("click", () => {
        SORT = b.dataset.sort;
        document.querySelectorAll("#sortSeg button").forEach((x) => x.classList.toggle("on", x === b));
        renderList();
      });
    });
    document.getElementById("qTitle").addEventListener("keydown", (e) => {
      if (e.key === "Enter") applySearch();
    });
    document.getElementById("qRange").addEventListener("change", (e) => {
      setRange(e.target.checked);              // 종료일 토글 → 종료일 칸 표시/숨김
    });
    document.getElementById("qHl").addEventListener("change", applySearch);   // 하이라이트만 보기: 즉시 반영
    document.getElementById("qFav").addEventListener("change", applySearch);  // 즐겨찾기만 보기: 즉시 반영

    document.getElementById("refreshBtn").onclick = load;
    document.getElementById("logoutBtn").onclick = () => {
      if (confirm("이 기기에서 토큰을 삭제할까요?")) { clearPat(); location.reload(); }
    };

    // 미리보기 밖을 탭/클릭하거나 스크롤하면 닫기(썸네일 탭은 자체 토글이 처리)
    document.addEventListener("click", (e) => { if (!e.target.closest(".card-thumb")) hideThumbHover(); });
    window.addEventListener("scroll", hideThumbHover, { passive: true });

    if (window.lucide) lucide.createIcons();   // 상단바·필터 아이콘 즉시 렌더
    requirePat(load);
  </script>
</body>
</html>
