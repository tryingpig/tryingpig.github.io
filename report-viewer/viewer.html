<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>리포트 뷰어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar viewer-topbar" id="topbar">
    <a class="back" href="index.html">‹</a>
    <h1 id="docTitle">불러오는 중…</h1>
    <div class="spacer"></div>
    <button class="btn" id="modeBtn" title="읽기/PDF 전환">📖 읽기</button>
    <a class="btn" id="hlLink">모아보기</a>
  </div>
  <div id="banner"></div>
  <div id="pdfContainer"><div class="loading">PDF 여는 중…</div></div>
  <div id="readingContainer" class="reading" style="display:none"></div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.worker.min.mjs";

    const params = new URLSearchParams(location.search);
    const REPORT_ID = params.get("id");
    const GOTO_PAGE = parseInt(params.get("page") || "0", 10);

    document.getElementById("hlLink").href = "highlights.html?id=" + encodeURIComponent(REPORT_ID);

    // 상태
    let highlights = [];     // 전체 하이라이트
    let annoSha = null;
    const deletedHids = new Set();
    let totalTextLen = 0;
    let pdfDoc = null;        // 읽기 모드 재사용
    let pdfRendered = false;  // PDF 캔버스 렌더 여부 (지연 렌더)
    let readingBuilt = false;
    let mode = "pdf";         // "pdf" | "reading"
    const pageItems = {};     // pageNo -> [{str,x,y,w,h}] 정규화 좌표 (텍스트↔좌표 역산용)
    const START_MODE = (params.get("mode") === "read") ? "reading" : "pdf";

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    const COLORS = ["yellow", "green", "pink"];

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    /* ── 초기 로드 ── */
    async function start() {
      try {
        const [reportsDoc, anno] = await Promise.all([
          loadReports(),
          loadAnnotations(REPORT_ID),
        ]);
        const report = (reportsDoc.reports || []).find((r) => r.id === REPORT_ID);
        if (!report) throw new Error("리포트를 찾을 수 없습니다: " + REPORT_ID);
        document.getElementById("docTitle").textContent = report.title || REPORT_ID;
        document.title = report.title || "리포트 뷰어";

        highlights = anno.data.highlights || [];
        annoSha = anno.sha;

        const buf = await loadPdf(report.pdf_path);
        pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;

        // 삭제 예정 배너
        if (report.pending_deletion) {
          document.getElementById("banner").insertAdjacentHTML("beforeend",
            `<div class="banner warn">🗑 이 PDF는 ${esc(report.delete_after)} 삭제 예정 — 하이라이트·요약은 Notion에 보존됩니다</div>`);
        }

        if (START_MODE === "reading") {
          await setMode("reading");   // 목록에서 '읽기'로 바로 진입 → PDF 캔버스는 지연
        } else {
          await ensurePdfRendered();
          if (GOTO_PAGE > 0) {
            const el = document.querySelector(`.page-wrap[data-page="${GOTO_PAGE}"]`);
            if (el) el.scrollIntoView();
          }
        }
      } catch (err) {
        handleError(err, start);
      }
    }

    /* PDF 캔버스는 실제로 PDF 모드를 볼 때만 렌더 (지연) */
    async function ensurePdfRendered() {
      if (pdfRendered) return;
      await renderPdf();
      pdfRendered = true;
      if (totalTextLen < 5) {
        document.getElementById("banner").insertAdjacentHTML("beforeend",
          `<div class="banner">텍스트 레이어 없음 — 하이라이트 불가 (스캔본)</div>`);
      }
    }

    /* ── PDF 렌더 ── */
    async function renderPdf() {
      const container = document.getElementById("pdfContainer");
      container.innerHTML = "";
      const pdf = pdfDoc;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const cssWidth = Math.min(window.innerWidth - 16, 900);

      for (let n = 1; n <= pdf.numPages; n++) {
        const page = await pdf.getPage(n);
        const base = page.getViewport({ scale: 1 });
        const scale = cssWidth / base.width;
        const viewport = page.getViewport({ scale });

        const wrap = document.createElement("div");
        wrap.className = "page-wrap";
        wrap.dataset.page = n;
        wrap.style.width = viewport.width + "px";
        wrap.style.height = viewport.height + "px";

        // 캔버스 (본문)
        const canvas = document.createElement("canvas");
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        wrap.appendChild(canvas);

        // 하이라이트 레이어
        const hlLayer = document.createElement("div");
        hlLayer.className = "hlLayer";
        wrap.appendChild(hlLayer);

        // 텍스트 레이어
        const textLayer = document.createElement("div");
        textLayer.className = "textLayer";
        wrap.appendChild(textLayer);

        container.appendChild(wrap);

        await page.render({ canvasContext: ctx, viewport }).promise;
        await buildTextLayer(page, viewport, textLayer);
        renderHighlightsForPage(n, hlLayer, wrap);
      }
    }

    /* getTextContent로 투명 텍스트 레이어 직접 구성 (버전 안정) */
    async function buildTextLayer(page, viewport, layer) {
      const tc = await page.getTextContent();
      const frag = document.createDocumentFragment();
      const spans = [];
      for (const item of tc.items) {
        if (!item.str) continue;
        totalTextLen += item.str.length;
        const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
        const fontH = Math.hypot(tx[2], tx[3]);
        if (fontH === 0) continue;
        const span = document.createElement("span");
        span.textContent = item.str;
        span.style.left = tx[4] + "px";
        span.style.top = tx[5] - fontH + "px";
        span.style.fontSize = fontH + "px";
        span.style.fontFamily = item.fontName || "sans-serif";
        frag.appendChild(span);
        spans.push({ span, wantW: item.width * viewport.scale });
      }
      layer.appendChild(frag);
      // 글자 폭을 원본에 맞춰 가로 스케일 보정 (선택 영역 정확도)
      for (const s of spans) {
        const w = s.span.offsetWidth;
        if (w > 0 && s.wantW > 0) {
          s.span.style.transform = `scaleX(${s.wantW / w})`;
        }
      }
    }

    /* ── 하이라이트 렌더 ── */
    function renderHighlightsForPage(pageNo, hlLayer, wrap) {
      hlLayer.innerHTML = "";
      const w = wrap.offsetWidth, h = wrap.offsetHeight;
      for (const hl of highlights) {
        if (hl.page !== pageNo) continue;
        for (const r of hl.rects) {
          const div = document.createElement("div");
          div.className = "hl-rect " + (hl.color || "yellow");
          div.style.left = r.x * w + "px";
          div.style.top = r.y * h + "px";
          div.style.width = r.w * w + "px";
          div.style.height = r.h * h + "px";
          div.dataset.hid = hl.hid;
          div.addEventListener("click", (e) => {
            e.stopPropagation();
            showDeletePopup(hl, e.clientX, e.clientY);
          });
          hlLayer.appendChild(div);
        }
      }
    }

    function rerenderAllHighlights() {
      document.querySelectorAll(".page-wrap").forEach((wrap) => {
        const pageNo = parseInt(wrap.dataset.page, 10);
        renderHighlightsForPage(pageNo, wrap.querySelector(".hlLayer"), wrap);
      });
    }

    /* ── 선택 → 하이라이트 생성 ── */
    let popupEl = null;
    function removePopup() { if (popupEl) { popupEl.remove(); popupEl = null; } }

    function onSelectionEnd() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed || !sel.toString().trim()) { removePopup(); return; }
      const range = sel.getRangeAt(0);
      let node = range.startContainer;
      if (node.nodeType === 3) node = node.parentElement;
      const text = sel.toString().trim();
      const clientRects = Array.from(range.getClientRects()).filter((r) => r.width > 1 && r.height > 1);
      if (!clientRects.length) return;
      const last = clientRects[clientRects.length - 1];

      const pdfWrap = node.closest(".page-wrap");
      const rdPage = node.closest(".rd-page");

      if (pdfWrap) {
        // PDF 모드: 화면 좌표 → 페이지 정규화 좌표
        const pageNo = parseInt(pdfWrap.dataset.page, 10);
        const wr = pdfWrap.getBoundingClientRect();
        let norm = clientRects.map((r) => ({
          x: (r.left - wr.left) / wr.width, y: (r.top - wr.top) / wr.height,
          w: r.width / wr.width, h: r.height / wr.height,
        }));
        norm = mergeLineRects(norm);
        showColorPopup(last.left, last.bottom, (color) => createHighlight(pageNo, text, norm, color));
      } else if (rdPage) {
        // 읽기 모드: 텍스트 → PDF 좌표 역산
        const pageNo = parseInt(rdPage.dataset.page, 10);
        showColorPopup(last.left, last.bottom, (color) =>
          createHighlight(pageNo, text, computeRectsFromText(pageNo, text), color));
      } else {
        removePopup();
      }
    }

    /* 두 모드 공통 하이라이트 생성 */
    function createHighlight(pageNo, text, rects, color) {
      const hl = { hid: "h_" + Date.now(), page: pageNo, text, rects: rects || [], color, created_at: nowKst() };
      highlights.push(hl);
      if (mode === "reading") { renderReadingHighlights(); } else { rerenderAllHighlights(); }
      const sel = window.getSelection();
      if (sel) sel.removeAllRanges();
      persist();
    }

    function mergeLineRects(rects) {
      rects.sort((a, b) => a.y - b.y || a.x - b.x);
      const out = [];
      for (const r of rects) {
        const prev = out[out.length - 1];
        if (prev && Math.abs(prev.y - r.y) < 0.008 && Math.abs(prev.h - r.h) < 0.01) {
          const right = Math.max(prev.x + prev.w, r.x + r.w);
          prev.x = Math.min(prev.x, r.x);
          prev.w = right - prev.x;
        } else {
          out.push({ ...r });
        }
      }
      return out;
    }

    function showColorPopup(cx, cy, onPick) {
      removePopup();
      const p = document.createElement("div");
      p.className = "hl-popup";
      const W = 172, H = 42;
      const left = Math.max(8, Math.min(cx, window.innerWidth - W - 8));
      let top = cy + 10;
      if (top + H > window.innerHeight - 8) top = Math.max(8, cy - H - 14);
      p.style.left = left + "px";
      p.style.top = top + "px";
      p.innerHTML = COLORS.map((c) => `<div class="swatch ${c}" data-c="${c}"></div>`).join("") +
        `<div class="swatch del" data-c="cancel">✕</div>`;
      document.body.appendChild(p);
      popupEl = p;
      let done = false;
      p.querySelectorAll(".swatch").forEach((s) => {
        const pick = (e) => {
          if (done) return; done = true;
          e.preventDefault(); e.stopPropagation();
          const c = s.dataset.c;
          removePopup();
          if (c !== "cancel") onPick(c);
        };
        s.addEventListener("touchend", pick, { passive: false });
        s.addEventListener("click", pick);
      });
    }

    function showDeletePopup(hl, cx, cy) {
      removePopup();
      const p = document.createElement("div");
      p.className = "hl-popup";
      p.style.left = Math.max(8, Math.min(cx - 20, window.innerWidth - 96)) + "px";
      p.style.top = Math.min(cy + 8, window.innerHeight - 50) + "px";
      p.innerHTML = `<div class="swatch del" data-a="del" style="width:auto;padding:0 12px">🗑 삭제</div>`;
      document.body.appendChild(p);
      popupEl = p;
      let done = false;
      const del = (e) => {
        if (done) return; done = true;
        e.preventDefault(); e.stopPropagation();
        removePopup();
        highlights = highlights.filter((h) => h.hid !== hl.hid);
        deletedHids.add(hl.hid);
        if (mode === "reading") { renderReadingHighlights(); } else { rerenderAllHighlights(); }
        persist();
      };
      const b = p.querySelector("[data-a='del']");
      b.addEventListener("touchend", del, { passive: false });
      b.addEventListener("click", del);
    }

    /* ── 저장 (낙관적 UI) ── */
    let saving = false, dirty = false;
    async function persist() {
      dirty = true;
      if (saving) return;
      saving = true;
      while (dirty) {
        dirty = false;
        try {
          const res = await saveAnnotations(REPORT_ID, highlights, deletedHids, annoSha);
          annoSha = res.sha;
          bumpCount(REPORT_ID, highlights.length);
        } catch (err) {
          if (err instanceof AuthError) { saving = false; handleError(err, () => {}); return; }
          toast("저장 실패 — 다시 시도합니다");
          dirty = true;
          await new Promise((r) => setTimeout(r, 1500));
        }
      }
      saving = false;
      toast("저장됨");
    }

    /* reports.json의 highlight_count 갱신 (비필수, 실패 무시) */
    async function bumpCount(reportId, count) {
      try {
        const res = await ghFetch("contents/index/reports.json");
        if (!res.ok) return;
        const obj = await res.json();
        const doc = JSON.parse(decodeB64Utf8(obj.content));
        const r = (doc.reports || []).find((x) => x.id === reportId);
        if (!r || r.highlight_count === count) return;
        r.highlight_count = count;
        await ghFetch("contents/index/reports.json", {
          method: "PUT",
          body: {
            message: `count: ${reportId} ${count}`,
            content: encodeUtf8B64(JSON.stringify(doc, null, 2)),
            sha: obj.sha,
          },
        });
      } catch (e) { console.warn("count 갱신 생략", e); }
    }

    /* ── 읽기 모드 (텍스트 리플로우) ── */
    async function setMode(m) {
      if (m === "reading" && !pdfDoc) { toast("PDF 로딩 중…"); return; }
      mode = m;
      const pdfC = document.getElementById("pdfContainer");
      const rdC = document.getElementById("readingContainer");
      const btn = document.getElementById("modeBtn");
      if (m === "reading") {
        if (!readingBuilt) {
          rdC.innerHTML = `<div class="loading">읽기 화면 구성 중…</div>`;
          rdC.style.display = "";
          pdfC.style.display = "none";
          await buildReadingView();
          readingBuilt = true;
        } else {
          rdC.style.display = ""; pdfC.style.display = "none";
        }
        renderReadingHighlights();   // PDF에서 친 하이라이트 반영
        btn.textContent = "📄 PDF";
      } else {
        await ensurePdfRendered();   // 아직 렌더 안 했으면 지금 렌더
        rdC.style.display = "none"; pdfC.style.display = "";
        rerenderAllHighlights();     // 읽기에서 친 하이라이트 반영
        btn.textContent = "📖 읽기";
      }
      window.scrollTo(0, 0);
    }

    async function buildReadingView() {
      const rdC = document.getElementById("readingContainer");
      rdC.innerHTML = "";
      for (let n = 1; n <= pdfDoc.numPages; n++) {
        const page = await pdfDoc.getPage(n);
        await buildPageReading(page, n, rdC);
      }
      // 원본 페이지 이미지 지연 렌더 버튼
      rdC.querySelectorAll(".rd-img-btn").forEach((b) => {
        b.onclick = () => renderPageImage(parseInt(b.dataset.page, 10), b);
      });
    }

    const joinItems = (its) => its.map((i) => i.str).join("").replace(/\s+/g, " ").trim();

    async function buildPageReading(page, pageNo, container) {
      const vp = page.getViewport({ scale: 1 });
      const W = vp.width;
      const tc = await page.getTextContent();
      const raw = [];
      const items = [];
      for (const it of tc.items) {
        if (!it.str || !it.str.trim()) continue;
        const tx = pdfjsLib.Util.transform(vp.transform, it.transform);
        const fh = Math.hypot(tx[2], tx[3]);
        const w = it.width || 0;
        raw.push({ str: it.str, x: tx[4], xr: tx[4] + w, y: tx[5] - fh, h: fh });
        items.push({ str: it.str, x: tx[4] / W, y: (tx[5] - fh) / vp.height, w: w / W, h: fh / vp.height });
      }
      pageItems[pageNo] = items;
      if (!raw.length) {
        container.insertAdjacentHTML("beforeend",
          `<div class="rd-page" data-page="${pageNo}"><div class="rd-pageno">p.${pageNo}</div>` +
          `<button class="rd-img-btn" data-page="${pageNo}">🖼 이 페이지 보기 (이미지)</button></div>`);
        return;
      }

      const lines = groupLines(raw);
      for (const ln of lines) ln.text = joinItems(ln.items);

      // 캡션(표N/그림N)~자료: 구간을 표/그림으로 인식 → 본문에서 제외하고 이미지로
      const figBands = detectCaptionFigures(lines, vp.height);
      const inFig = (y) => figBands.some((b) => y >= b.top - 1 && y <= b.bottom + 1);
      const textLines = lines.filter((ln) => !inFig(ln.y + ln.h / 2));

      const colX = detectColumnSplit(textLines, W);
      let els = [];
      if (colX == null) {
        const arr = textLines.map((ln) => ({ y: ln.y, h: ln.h, text: ln.text }));
        els = paraBlocks(arr).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text }));
      } else if (colX < W * 0.34) {
        // 왼쪽 사이드바(소제목) + 오른쪽 본문
        const left = [], right = [];
        for (const ln of textLines) splitLine(ln, colX, left, right);
        els = blockLines(left, 1.8).map((b) => ({ y: b.y - 3, kind: "label", text: b.text }))
          .concat(paraBlocks(right).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text })));
      } else {
        // 2단 본문: 왼쪽 컬럼 먼저(그대로), 오른쪽은 뒤로 (y에 큰 오프셋)
        const left = [], right = [];
        for (const ln of textLines) splitLine(ln, colX, left, right);
        els = paraBlocks(left).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text }))
          .concat(paraBlocks(right).map((b) => ({ y: 1e9 + b.y, kind: b.heading ? "h" : "p", text: b.text })));
      }

      // 표/그림 이미지 크롭 삽입
      if (figBands.length) {
        const figs = await cropBands(page, figBands, W, vp.height);
        for (const f of figs) els.push({ y: f.y, kind: "fig", url: f.url });
      }

      els.sort((a, b) => a.y - b.y);
      let html = `<div class="rd-pageno">p.${pageNo}</div>`;
      for (const b of els) {
        if (b.kind === "fig") html += `<img class="rd-fig" src="${b.url}" alt="표/그림">`;
        else if (b.kind === "label") html += `<h4 class="rd-label">${esc(b.text)}</h4>`;
        else if (b.kind === "h") html += `<h3 class="rd-h">${esc(b.text)}</h3>`;
        else html += `<p class="rd-para">${esc(b.text)}</p>`;
      }

      html += `<button class="rd-img-btn" data-page="${pageNo}">🖼 원본 페이지 보기</button>`;
      container.insertAdjacentHTML("beforeend", `<div class="rd-page" data-page="${pageNo}">${html}</div>`);
    }

    /* 줄 묶기 (y 근접) */
    function groupLines(raw) {
      raw.sort((a, b) => a.y - b.y || a.x - b.x);
      const lines = [];
      for (const r of raw) {
        const last = lines[lines.length - 1];
        if (last && Math.abs(last.y - r.y) < r.h * 0.6) { last.items.push(r); last.h = Math.max(last.h, r.h); }
        else lines.push({ y: r.y, h: r.h, items: [r] });
      }
      for (const ln of lines) ln.items.sort((a, b) => a.x - b.x);
      return lines;
    }

    /* 컬럼 경계 감지: 여러 줄에서 일관된 세로 여백(거터)이 있으면 그 x를 반환, 없으면 null */
    function detectColumnSplit(lines, W) {
      const cand = [];
      for (const ln of lines) {
        const its = ln.items;
        for (let i = 0; i < its.length - 1; i++) {
          const gap = its[i + 1].x - its[i].xr;
          if (gap > 0.06 * W) cand.push((its[i].xr + its[i + 1].x) / 2);
        }
      }
      if (cand.length < 3) return null;
      cand.sort((a, b) => a - b);
      const mid = cand[Math.floor(cand.length / 2)];
      const near = cand.filter((c) => Math.abs(c - mid) < 0.04 * W).length;
      if (near < 3 || near < cand.length * 0.4) return null;
      let crossing = 0;
      for (const ln of lines) {
        if (ln.items.some((it) => it.xr < mid) && ln.items.some((it) => it.x > mid)) crossing++;
      }
      if (crossing < 3) return null;
      return mid;
    }

    /* 한 줄을 컬럼 경계로 좌/우로 분리 */
    function splitLine(ln, colX, left, right) {
      const L = ln.items.filter((it) => (it.x + it.xr) / 2 < colX);
      const R = ln.items.filter((it) => (it.x + it.xr) / 2 >= colX);
      if (L.length) left.push({ y: ln.y, h: Math.max(...L.map((i) => i.h)), text: joinItems(L) });
      if (R.length) right.push({ y: ln.y, h: Math.max(...R.map((i) => i.h)), text: joinItems(R) });
    }

    /* 세로 간격 작은 줄들을 한 블록(라벨)으로 */
    function blockLines(arr, gapFactor) {
      const blocks = [];
      let prevY = null, prevH = null, cur = null;
      for (const ln of arr) {
        if (!ln.text) continue;
        if (cur && prevY != null && (ln.y - prevY) < prevH * gapFactor) { cur.text += " " + ln.text; cur.h = Math.max(cur.h, ln.h); }
        else { cur = { y: ln.y, h: ln.h, text: ln.text }; blocks.push(cur); }
        prevY = ln.y; prevH = ln.h;
      }
      return blocks;
    }

    /* 본문 문단 블록 (+ 폰트 크기로 제목 감지) */
    function paraBlocks(arr) {
      const texts = arr.filter((l) => l.text);
      if (!texts.length) return [];
      const hs = texts.map((l) => l.h).sort((a, b) => a - b);
      const body = hs[Math.floor(hs.length / 2)] || 10;
      const blocks = [];
      let cur = null, prevY = null, prevH = body;
      for (const ln of texts) {
        const heading = ln.h > body * 1.35;
        const gap = prevY == null ? 0 : ln.y - prevY;
        if (heading) { blocks.push({ y: ln.y, heading: true, text: ln.text }); cur = null; }
        else {
          if (!cur || (prevY != null && gap > prevH * 1.9)) { cur = { y: ln.y, heading: false, text: ln.text }; blocks.push(cur); }
          else cur.text += " " + ln.text;
        }
        prevY = ln.y; prevH = ln.h;
      }
      return blocks;
    }

    function renderBlocks(blocks) {
      let html = "";
      for (const b of blocks) html += b.heading ? `<h3 class="rd-h">${esc(b.text)}</h3>` : `<p class="rd-para">${esc(b.text)}</p>`;
      return html;
    }

    /* 캡션(표N/그림N)부터 자료: 줄까지를 표/그림 영역으로 인식 */
    function detectCaptionFigures(lines, H) {
      const capRe = /^\s*[<\[【(]?\s*(그림|표|차트|도표|Figure|Fig|Table|Chart|Exhibit)\s*[-.]?\s*\d+(?!\s*(?:개|명|원|년|월|일|위|배|가지|%))/i;
      const srcRe = /^\s*(자료|출처|주|참고|Source|Note)\s*[:：]/;
      const caps = [];
      for (let i = 0; i < lines.length; i++) if (capRe.test(lines[i].text)) caps.push(i);
      const bands = [];
      for (let k = 0; k < caps.length; k++) {
        const ci = caps[k];
        const nextCap = (k + 1 < caps.length) ? caps[k + 1] : lines.length;
        const top = lines[ci].y;
        let bottom = null;
        for (let j = ci + 1; j < nextCap; j++) {
          if (srcRe.test(lines[j].text)) { bottom = lines[j].y + lines[j].h; break; }
        }
        if (bottom == null) {
          const lastJ = nextCap - 1;
          bottom = (lastJ > ci) ? (lines[lastJ].y + lines[lastJ].h) : (top + H * 0.08);
        }
        if (bottom - top > H * 0.03) bands.push({ top, bottom });
      }
      bands.sort((a, b) => a.top - b.top);
      const merged = [];
      for (const b of bands) {
        const last = merged[merged.length - 1];
        if (last && b.top <= last.bottom + 2) last.bottom = Math.max(last.bottom, b.bottom);
        else merged.push({ ...b });
      }
      return merged;
    }

    /* 지정 밴드들을 원본에서 잘라 dataURL 이미지로 반환 */
    async function cropBands(page, bands, W, H) {
      const cssW = Math.min(window.innerWidth - 40, 820);
      const scale = cssW / W;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const vp = page.getViewport({ scale });
      const full = document.createElement("canvas");
      full.width = Math.floor(vp.width * dpr);
      full.height = Math.floor(vp.height * dpr);
      const ctx = full.getContext("2d");
      ctx.scale(dpr, dpr);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      const out = [];
      for (const b of bands) {
        const pad = 3;
        const sy = Math.max(0, Math.floor((b.top - pad) * scale * dpr));
        const ey = Math.min(full.height, Math.ceil((b.bottom + pad) * scale * dpr));
        const sh = ey - sy;
        if (sh < 8) continue;
        const crop = document.createElement("canvas");
        crop.width = full.width; crop.height = sh;
        crop.getContext("2d").drawImage(full, 0, sy, full.width, sh, 0, 0, full.width, sh);
        out.push({ y: b.top, url: crop.toDataURL("image/jpeg", 0.82) });
      }
      return out;
    }

    async function renderPageImage(pageNo, btn) {
      btn.disabled = true; btn.textContent = "불러오는 중…";
      const page = await pdfDoc.getPage(pageNo);
      const cssW = Math.min(window.innerWidth - 32, 860);
      const scale = cssW / page.getViewport({ scale: 1 }).width;
      const vp = page.getViewport({ scale });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const canvas = document.createElement("canvas");
      canvas.width = Math.floor(vp.width * dpr);
      canvas.height = Math.floor(vp.height * dpr);
      canvas.style.width = "100%";
      canvas.style.border = "1px solid var(--line)";
      canvas.style.borderRadius = "8px";
      canvas.style.marginTop = "8px";
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      btn.replaceWith(canvas);
    }

    /* ── 읽기 모드 하이라이트 (텍스트 기준) ── */
    const NW = (s) => (s || "").replace(/\s+/g, "");        // 공백 제거 정규화
    const NS = (s) => (s || "").replace(/\s+/g, " ").trim(); // 공백 단일화

    function clearReadingMarks() {
      const rdC = document.getElementById("readingContainer");
      rdC.querySelectorAll("mark.rd-hl").forEach((m) => m.replaceWith(document.createTextNode(m.textContent)));
      rdC.querySelectorAll(".rd-para, .rd-h").forEach((b) => b.normalize());
    }

    function renderReadingHighlights() {
      if (!readingBuilt) return;
      clearReadingMarks();
      for (const hl of highlights) wrapReading(hl);
    }

    /* 읽기 화면의 해당 페이지 문단에서 hl.text를 찾아 <mark>로 감싼다 */
    function wrapReading(hl) {
      const rdC = document.getElementById("readingContainer");
      const page = rdC.querySelector(`.rd-page[data-page="${hl.page}"]`);
      if (!page) return false;
      const t = NS(hl.text);
      if (!t) return false;
      for (const b of page.querySelectorAll(".rd-para, .rd-h")) {
        const node = b.firstChild;
        if (!node || node.nodeType !== 3) continue;
        const idx = node.textContent.indexOf(t);
        if (idx >= 0) {
          const r = document.createRange();
          r.setStart(node, idx);
          r.setEnd(node, idx + t.length);
          const mark = document.createElement("mark");
          mark.className = "rd-hl " + (hl.color || "yellow");
          mark.dataset.hid = hl.hid;
          try {
            r.surroundContents(mark);
            mark.addEventListener("click", (e) => {
              e.stopPropagation();
              showDeletePopup(hl, e.clientX, e.clientY);
            });
            return true;
          } catch (e) { /* 경계가 여러 노드에 걸치면 스킵 */ }
        }
      }
      return false;
    }

    /* 읽기 모드에서 고른 텍스트를 PDF 정규화 좌표로 역산 */
    function computeRectsFromText(pageNo, text) {
      const items = pageItems[pageNo];
      if (!items || !items.length) return [];
      const target = NW(text);
      if (!target) return [];
      let big = "";
      const map = [];
      items.forEach((it, ii) => {
        const s = NW(it.str);
        for (let k = 0; k < s.length; k++) { big += s[k]; map.push(ii); }
      });
      const pos = big.indexOf(target);
      if (pos < 0) return [];
      const from = map[pos], to = map[pos + target.length - 1];
      let rects = items.slice(from, to + 1).map((it) => ({ x: it.x, y: it.y, w: it.w, h: it.h }));
      return mergeLineRects(rects);
    }

    document.getElementById("modeBtn").onclick = () => setMode(mode === "pdf" ? "reading" : "pdf");

    /* 이벤트 — selectionchange 디바운스로 모바일 길게눌러 선택에 대응 */
    let selTimer = null;
    function scheduleSel() { clearTimeout(selTimer); selTimer = setTimeout(onSelectionEnd, 280); }
    document.addEventListener("selectionchange", scheduleSel);
    document.addEventListener("mouseup", () => setTimeout(onSelectionEnd, 10));
    document.addEventListener("touchend", () => setTimeout(onSelectionEnd, 10));
    document.addEventListener("pointerdown", (e) => {
      if (popupEl && !e.target.closest(".hl-popup") && !e.target.closest(".hl-rect")) removePopup();
    });

    // 스크롤 시 상단바 숨김
    let lastY = 0;
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      const bar = document.getElementById("topbar");
      if (y > lastY && y > 80) bar.classList.add("hidden");
      else bar.classList.remove("hidden");
      lastY = y;
    });

    requirePat(start);
  </script>
