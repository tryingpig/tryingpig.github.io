<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#15171c" media="(prefers-color-scheme: dark)">
  <title>리포트 뷰어</title>
  <link rel="stylesheet" href="style.css?v=18">
</head>
<body>
  <div class="topbar viewer-topbar" id="topbar">
    <a class="back" href="index.html">‹</a>
    <h1 id="docTitle">불러오는 중…</h1>
    <div class="spacer"></div>
    <button class="btn" id="modeBtn" title="읽기/PDF 전환">📖 읽기</button>
    <button class="btn" id="llmBtn" title="읽기 본문을 LLM(claude)으로 정리 요청" style="display:none">🤖 LLM</button>
    <a class="btn" id="hlLink">모아보기</a>
  </div>
  <div id="banner"></div>
  <div id="pdfContainer"><div class="loading">PDF 여는 중…</div></div>
  <div id="readingContainer" class="reading" style="display:none"></div>
  <button id="captureFab" title="이미지 캡처" style="display:none">✂️</button>
  <div id="captureHint" style="display:none">드래그로 영역 선택 · 표/그림 캡처<button id="captureHintX">✕</button></div>
  <div class="toast" id="toast"></div>

  <script src="app.js?v=18"></script>
  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.worker.min.mjs";

    const params = new URLSearchParams(location.search);
    const REPORT_ID = params.get("id");
    const GOTO_PAGE = parseInt(params.get("page") || "0", 10);
    const GOTO_HL = params.get("hl") || "";   // 모아보기에서 특정 하이라이트로 점프

    document.getElementById("hlLink").href = "highlights.html?id=" + encodeURIComponent(REPORT_ID);

    // 상태
    let highlights = [];     // 전체 하이라이트
    let annoSha = null;
    const deletedHids = new Set();
    let totalTextLen = 0;
    let noTextLayer = false;  // 스캔본(텍스트 레이어 없음) — reports.json has_text_layer 기준
    // 온디맨드 LLM 본문 재추출 상태
    let llmEngine = null;     // 현재 본문 엔진 (llm | heuristic | null)
    let llmQueued = false;    // 재추출 요청이 큐에 있음
    let llmPoll = null;
    let llmChecked = false;
    let pdfDoc = null;        // 읽기 모드 재사용 (사전렌더 모드에선 null)
    let READTEXT = null;      // 수집 시 추출한 페이지별 본문 {페이지번호: [{kind,text}]} (있으면 heuristic 대체)
    // ── 사전 렌더(서버에서 미리 구운 페이지 이미지 + 글자좌표) ──
    let PRE = null;           // {페이지: {w,h,spans:[{s,x,y,w,h,fs}]}} — 있으면 PDF 안 받고 이걸로 구동
    let PAGESDIR = null;      // 페이지 이미지 폴더 vault 경로 (pages/<id>)
    let NUMPAGES = 0;         // 총 페이지 수
    const _pageImgCache = {}; // 페이지 이미지 objectURL 캐시
    function numPages() { return pdfDoc ? pdfDoc.numPages : NUMPAGES; }
    /* 사전 렌더 페이지 이미지를 vault(비공개)에서 인증 fetch → objectURL (지연·1회) */
    async function loadPageImage(n) {
      if (_pageImgCache[n]) return _pageImgCache[n];
      let blob = null;
      const key = "img:" + REPORT_ID + "/" + n;
      const hit = await idbGetAsset(key);          // 영구 캐시 우선(재열람·스크롤 즉시)
      if (hit && hit.val) blob = hit.val;
      if (!blob) {
        const res = await ghFetch("contents/" + PAGESDIR + "/" + n + ".jpg", { accept: "application/vnd.github.raw" });
        if (!res.ok) throw new Error("page image " + n + " " + res.status);
        blob = await res.blob();
        idbPutAsset(key, blob);                    // 페이지 이미지는 id 기준 불변 → 캐시 안전
      }
      const url = URL.createObjectURL(blob);
      _pageImgCache[n] = url;
      return url;
    }
    /* 글자좌표(spans, 정규화)로 투명 텍스트 레이어 구성 — pdf.js 없이 선택/밑줄 가능 */
    function buildTextLayerFromSpans(spans, W, H, layer) {
      const frag = document.createDocumentFragment();
      const measured = [];
      for (const s of spans) {
        if (!s.s) continue;
        totalTextLen += s.s.length;
        const span = document.createElement("span");
        span.textContent = s.s;
        span.style.left = (s.x * W) + "px";
        span.style.top = (s.y * H) + "px";
        span.style.fontSize = ((s.fs || s.h) * H) + "px";
        frag.appendChild(span);
        measured.push({ span, wantW: s.w * W });
      }
      layer.appendChild(frag);
      for (const m of measured) {
        const w = m.span.offsetWidth;
        if (w > 0 && m.wantW > 0) m.span.style.transform = `scaleX(${m.wantW / w})`;
      }
    }

    /* ── PDF 로컬 캐시 (IndexedDB) ── 열 때마다 재다운로드 방지, 재열람 즉시 */
    const PDF_DB = "rv_pdfcache", PDF_STORE = "pdfs", PDF_CAP = 12;
    const ASSET_STORE = "assets", ASSET_CAP = 500;   // 페이지 이미지·layout 캐시(리포트 id 기준 불변)
    function idbOpen() {
      return new Promise((res, rej) => {
        const r = indexedDB.open(PDF_DB, 2);
        r.onupgradeneeded = () => {
          const db = r.result;
          if (!db.objectStoreNames.contains(PDF_STORE)) db.createObjectStore(PDF_STORE);
          if (!db.objectStoreNames.contains(ASSET_STORE)) db.createObjectStore(ASSET_STORE);
        };
        r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
      });
    }
    async function idbGetAsset(key) {
      try {
        const db = await idbOpen();
        return await new Promise((res) => {
          const rq = db.transaction(ASSET_STORE, "readonly").objectStore(ASSET_STORE).get(key);
          rq.onsuccess = () => res(rq.result); rq.onerror = () => res(null);
        });
      } catch (e) { return null; }
    }
    async function idbPutAsset(key, val) {
      try {
        const db = await idbOpen();
        const st = db.transaction(ASSET_STORE, "readwrite").objectStore(ASSET_STORE);
        st.put({ val, ts: Date.now() }, key);
        await new Promise((res) => { st.transaction.oncomplete = res; st.transaction.onerror = res; });
        pruneAssets();
      } catch (e) { /* quota 등 무시 */ }
    }
    async function pruneAssets() {
      try {
        const db = await idbOpen();
        const st = db.transaction(ASSET_STORE, "readwrite").objectStore(ASSET_STORE);
        const keys = await new Promise((res) => { const rq = st.getAllKeys(); rq.onsuccess = () => res(rq.result || []); rq.onerror = () => res([]); });
        if (keys.length <= ASSET_CAP) return;
        const vals = await new Promise((res) => { const rq = st.getAll(); rq.onsuccess = () => res(rq.result || []); rq.onerror = () => res([]); });
        keys.map((k, i) => ({ k, ts: (vals[i] && vals[i].ts) || 0 }))
            .sort((a, b) => a.ts - b.ts)
            .slice(0, keys.length - ASSET_CAP)
            .forEach((o) => st.delete(o.k));
      } catch (e) { /* 무시 */ }
    }
    async function idbGet(id) {
      try {
        const db = await idbOpen();
        return await new Promise((res) => {
          const rq = db.transaction(PDF_STORE, "readonly").objectStore(PDF_STORE).get(id);
          rq.onsuccess = () => res(rq.result); rq.onerror = () => res(null);
        });
      } catch (e) { return null; }
    }
    async function idbPut(id, buf) {
      try {
        const db = await idbOpen();
        const st = db.transaction(PDF_STORE, "readwrite").objectStore(PDF_STORE);
        st.put({ buf, ts: Date.now() }, id);
        await new Promise((res) => { st.transaction.oncomplete = res; st.transaction.onerror = res; });
        prunePdfCache();
      } catch (e) { /* quota 초과 등 무시 */ }
    }
    async function prunePdfCache() {
      try {
        const db = await idbOpen();
        const st = db.transaction(PDF_STORE, "readwrite").objectStore(PDF_STORE);
        const keys = await new Promise((res) => { const rq = st.getAllKeys(); rq.onsuccess = () => res(rq.result || []); rq.onerror = () => res([]); });
        if (keys.length <= PDF_CAP) return;
        const vals = await new Promise((res) => { const rq = st.getAll(); rq.onsuccess = () => res(rq.result || []); rq.onerror = () => res([]); });
        keys.map((k, i) => ({ k, ts: (vals[i] && vals[i].ts) || 0 }))
            .sort((a, b) => a.ts - b.ts)
            .slice(0, keys.length - PDF_CAP)
            .forEach((o) => st.delete(o.k));
      } catch (e) { /* 무시 */ }
    }
    /* 캐시에 있으면 그걸, 없으면 받아서 캐시 후 반환 */
    async function getPdfBuffer(id, path) {
      const hit = await idbGet(id);
      if (hit && hit.buf) return hit.buf;
      const buf = await loadPdf(path);
      idbPut(id, buf.slice(0));   // 사본 캐시(원본은 pdf.js가 detach할 수 있음)
      return buf;
    }
    let pdfRendered = false;  // PDF 캔버스 렌더 여부 (지연 렌더)
    let readingBuilt = false;
    let mode = "pdf";         // "pdf" | "reading"
    const pageItems = {};     // pageNo -> [{str,x,y,w,h}] 정규화 좌표 (텍스트↔좌표 역산용)
    const pageSnap = {};      // pageNo -> [{x,y,w,h}] 정규화 (표/그림 캡처 탭 스냅 후보)
    const START_MODE = (params.get("mode") === "read") ? "reading" : "pdf";

    function esc(s) {
      return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    const COLORS = ["yellow", "green", "pink"];

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    /* ── 초기 로드 ── */
    async function start() {
      try {
        const [reportsDoc, anno] = await Promise.all([
          loadReports(),
          loadAnnotations(REPORT_ID),
        ]);
        const report = (reportsDoc.reports || []).find((r) => r.id === REPORT_ID);
        if (!report) throw new Error("리포트를 찾을 수 없습니다: " + REPORT_ID);
        document.getElementById("docTitle").textContent = report.title || REPORT_ID;
        document.title = report.title || "리포트 뷰어";

        highlights = anno.data.highlights || [];
        annoSha = anno.sha;
        noTextLayer = report.has_text_layer === false;   // 스캔본 여부(지연 렌더라 텍스트 누적으론 판정 불가)
        llmEngine = report.text_engine || null;

        NUMPAGES = report.pages || 0;
        PAGESDIR = report.pages_dir || null;

        // 추출 본문(text/<id>.json)
        async function loadReadText() {
          if (!report.text_path) return;
          try {
            const res = await ghFetch("contents/" + report.text_path, { accept: "application/vnd.github.raw", cache: "no-store" });
            if (res.ok) { const td = await res.json(); READTEXT = td && td.pages ? td.pages : null; }
          } catch (e) { READTEXT = null; }
        }
        // 사전 렌더 글자좌표(pagelayout/<id>.json) — id 기준 불변이라 영구 캐시(3MB급 재다운로드 방지)
        async function loadLayout() {
          if (!report.layout_path) return;
          const key = "layout:" + REPORT_ID;
          try {
            const hit = await idbGetAsset(key);
            if (hit && hit.val && hit.val.pages) { PRE = hit.val.pages; return; }
          } catch (e) { /* 캐시 미스 무시 */ }
          try {
            const res = await ghFetch("contents/" + report.layout_path, { accept: "application/vnd.github.raw", cache: "no-store" });
            if (res.ok) { const j = await res.json(); PRE = j && j.pages ? j.pages : null; if (j) idbPutAsset(key, j); }
          } catch (e) { PRE = null; }
        }

        const preAvail = !!(report.layout_path && report.pages_dir);
        if (preAvail) {
          // 사전 렌더 경로: PDF를 아예 안 받는다(즉시 로딩). 실패 시 PDF로 폴백.
          await Promise.all([loadLayout(), loadReadText()]);
          if (PRE) {
            NUMPAGES = NUMPAGES || Object.keys(PRE).length;
            for (const [n, pg] of Object.entries(PRE)) {   // 좌표 역산용 pageItems를 좌표에서 채움
              pageItems[n] = (pg.spans || []).map((s) => ({ str: s.s, x: s.x, y: s.y, w: s.w, h: s.h }));
              pageSnap[n] = [];
            }
          }
        }
        if (!PRE) {
          // 폴백: 기존 pdf.js 경로 (PDF 다운로드 + 파싱)
          const [buf] = await Promise.all([getPdfBuffer(REPORT_ID, report.pdf_path), loadReadText()]);
          pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
          NUMPAGES = pdfDoc.numPages;
          cacheThumb(REPORT_ID);   // 목록 썸네일용 (백그라운드)
        }

        // 삭제 예정 배너
        if (report.pending_deletion) {
          document.getElementById("banner").insertAdjacentHTML("beforeend",
            `<div class="banner warn">🗑 이 PDF는 ${esc(report.delete_after)} 삭제 예정 — 하이라이트·요약은 Notion에 보존됩니다</div>`);
        }

        if (START_MODE === "reading") {
          await setMode("reading");   // 목록에서 '읽기'로 바로 진입 → PDF 캔버스는 지연
        } else {
          await ensurePdfRendered();
        }
        // 특정 하이라이트/페이지로 점프 (모아보기에서 진입) — 지연 렌더라 대상 페이지를 먼저 렌더
        if (GOTO_PAGE > 0 && mode === "pdf") {
          const el = document.querySelector(`.page-wrap[data-page="${GOTO_PAGE}"]`);
          if (el) { await renderPdfPage(el); el.scrollIntoView(); }
        }
        if (GOTO_HL) gotoHighlight(GOTO_HL, GOTO_PAGE);
      } catch (err) {
        handleError(err, start);
      }
    }

    /* PDF 캔버스는 실제로 PDF 모드를 볼 때만 렌더 (지연) */
    async function ensurePdfRendered() {
      if (pdfRendered) return;
      await renderPdf();
      pdfRendered = true;
      updateCaptureFab();
      if (noTextLayer) {
        document.getElementById("banner").insertAdjacentHTML("beforeend",
          `<div class="banner">텍스트 레이어 없음 — 하이라이트 불가 (스캔본)</div>`);
      }
    }

    /* ── PDF 렌더: 자리만 먼저 잡고, 화면 근처 페이지만 지연 렌더(큰 PDF 즉시 열림) ── */
    let pdfPageIO = null;
    async function renderPdf() {
      const container = document.getElementById("pdfContainer");
      container.innerHTML = "";
      const cssWidth = Math.min(window.innerWidth - 16, 900);
      // 1) 1페이지 비율로 전체 페이지 자리(placeholder) 높이를 추정해 한 번에 배치(스크롤 안정)
      let estH;
      if (PRE) {
        const p1 = PRE["1"] || Object.values(PRE)[0];
        estH = Math.round(cssWidth * p1.h / p1.w);
      } else {
        const p1 = await pdfDoc.getPage(1);
        const b1 = p1.getViewport({ scale: 1 });
        estH = Math.round(cssWidth * b1.height / b1.width);
      }
      const frag = document.createDocumentFragment();
      for (let n = 1; n <= numPages(); n++) {
        const wrap = document.createElement("div");
        wrap.className = "page-wrap";
        wrap.dataset.page = n;
        wrap.style.width = cssWidth + "px";
        wrap.style.height = estH + "px";
        frag.appendChild(wrap);
      }
      container.appendChild(frag);
      updateCaptureFab();   // 자리 생기면 바로 위젯 표시
      // 2) 뷰포트 근처 페이지만 실제 렌더
      if (pdfPageIO) pdfPageIO.disconnect();
      pdfPageIO = new IntersectionObserver((entries, obs) => {
        for (const en of entries) {
          if (en.isIntersecting) { obs.unobserve(en.target); renderPdfPage(en.target); }
        }
      }, { rootMargin: "1200px 0px" });
      container.querySelectorAll(".page-wrap").forEach((w) => pdfPageIO.observe(w));
    }

    /* 페이지 하나를 실제로 렌더(이미지/캔버스+텍스트레이어+하이라이트). 최초 1회만. */
    async function renderPdfPage(wrap) {
      if (wrap._rendered) return;
      wrap._rendered = true;
      const n = parseInt(wrap.dataset.page, 10);
      const cssWidth = Math.min(window.innerWidth - 16, 900);
      try {
        if (PRE) {
          // ── 사전 렌더: 미리 구운 이미지 + 글자좌표(PDF 불필요) ──
          const pg = PRE[String(n)];
          if (!pg) { return; }
          const vw = cssWidth, vh = cssWidth * pg.h / pg.w;
          wrap.style.width = vw + "px";
          wrap.style.height = vh + "px";
          const img = document.createElement("img");
          img.className = "pdf-pageimg";
          img.style.width = vw + "px";
          img.style.height = vh + "px";
          img.alt = "p." + n;
          wrap.insertBefore(img, wrap.firstChild);   // 오버레이(캡처 모드) 아래
          const hlLayer = document.createElement("div");
          hlLayer.className = "hlLayer";
          wrap.appendChild(hlLayer);
          const textLayer = document.createElement("div");
          textLayer.className = "textLayer";
          wrap.appendChild(textLayer);
          img.src = await loadPageImage(n);
          buildTextLayerFromSpans(pg.spans || [], vw, vh, textLayer);
          renderHighlightsForPage(n, hlLayer, wrap);
          return;
        }
        // ── 폴백: pdf.js 캔버스 렌더 ──
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const page = await pdfDoc.getPage(n);
        const base = page.getViewport({ scale: 1 });
        const scale = cssWidth / base.width;
        const viewport = page.getViewport({ scale });
        wrap.style.width = viewport.width + "px";
        wrap.style.height = viewport.height + "px";

        const canvas = document.createElement("canvas");
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        wrap.insertBefore(canvas, wrap.firstChild);   // 오버레이(캡처 모드) 아래에 넣기

        const hlLayer = document.createElement("div");
        hlLayer.className = "hlLayer";
        wrap.appendChild(hlLayer);
        const textLayer = document.createElement("div");
        textLayer.className = "textLayer";
        wrap.appendChild(textLayer);

        await page.render({ canvasContext: ctx, viewport }).promise;
        await buildTextLayer(page, viewport, textLayer);
        renderHighlightsForPage(n, hlLayer, wrap);
      } catch (e) {
        wrap._rendered = false;   // 실패 시 재시도 가능하게
      }
    }

    /* getTextContent로 투명 텍스트 레이어 직접 구성 (버전 안정) */
    async function buildTextLayer(page, viewport, layer) {
      const tc = await page.getTextContent();
      const frag = document.createDocumentFragment();
      const spans = [];
      for (const item of tc.items) {
        if (!item.str) continue;
        totalTextLen += item.str.length;
        const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
        const fontH = Math.hypot(tx[2], tx[3]);
        if (fontH === 0) continue;
        const span = document.createElement("span");
        span.textContent = item.str;
        span.style.left = tx[4] + "px";
        span.style.top = tx[5] - fontH + "px";
        span.style.fontSize = fontH + "px";
        span.style.fontFamily = item.fontName || "sans-serif";
        frag.appendChild(span);
        spans.push({ span, wantW: item.width * viewport.scale });
      }
      layer.appendChild(frag);
      // 글자 폭을 원본에 맞춰 가로 스케일 보정 (선택 영역 정확도)
      for (const s of spans) {
        const w = s.span.offsetWidth;
        if (w > 0 && s.wantW > 0) {
          s.span.style.transform = `scaleX(${s.wantW / w})`;
        }
      }
    }

    /* ── 하이라이트 렌더 ── */
    /* 하이라이트 1개의 사각형들을 레이어에 append (증분 렌더 공용) */
    function appendHlRects(hl, hlLayer, w, h) {
      for (const r of hl.rects) {
        const div = document.createElement("div");
        div.className = "hl-rect " + (hl.color || "yellow") + (hl.type === "image" ? " hl-img" : "");
        div.style.left = r.x * w + "px";
        div.style.top = r.y * h + "px";
        div.style.width = r.w * w + "px";
        div.style.height = r.h * h + "px";
        div.dataset.hid = hl.hid;
        div.addEventListener("click", (e) => {
          e.stopPropagation();
          showDeletePopup(hl, e.clientX, e.clientY);
        });
        hlLayer.appendChild(div);
      }
    }

    function renderHighlightsForPage(pageNo, hlLayer, wrap) {
      hlLayer.innerHTML = "";
      const w = wrap.offsetWidth, h = wrap.offsetHeight;
      for (const hl of highlights) {
        if (hl.page === pageNo) appendHlRects(hl, hlLayer, w, h);
      }
    }

    /* 새로 친 하이라이트 하나만 해당 PDF 페이지에 즉시 그림(전체 재렌더 없이 → 빠른 반응) */
    function renderOneHighlightPdf(hl) {
      const wrap = document.querySelector(`.page-wrap[data-page="${hl.page}"]`);
      if (!wrap) return;
      const hlLayer = wrap.querySelector(".hlLayer");
      if (!hlLayer) return;   // 미렌더 페이지면 렌더 시 그려짐
      appendHlRects(hl, hlLayer, wrap.offsetWidth, wrap.offsetHeight);
    }

    function rerenderAllHighlights() {
      document.querySelectorAll(".page-wrap").forEach((wrap) => {
        const hlLayer = wrap.querySelector(".hlLayer");
        if (!hlLayer) return;   // 아직 지연 렌더 안 된 페이지 → 렌더될 때 그려짐
        renderHighlightsForPage(parseInt(wrap.dataset.page, 10), hlLayer, wrap);
      });
    }

    /* ── 선택 → 하이라이트 생성 ── */
    let popupEl = null;
    function removePopup() { if (popupEl) { popupEl.remove(); popupEl = null; } selPopupText = null; }

    let selPopupText = null;   // 색 팝업이 현재 떠 있는 선택 텍스트(중복 재생성 방지)
    function onSelectionEnd() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed || !sel.toString().trim()) {
        if (popupEl && popupEl._protect) return;   // 캡처 색상 팝업은 선택이 없어도 유지
        removePopup(); selPopupText = null; return;
      }
      const range = sel.getRangeAt(0);
      let node = range.startContainer;
      if (node.nodeType === 3) node = node.parentElement;
      const text = sel.toString().trim();
      // 같은 선택에 이미 색 팝업이 떠 있으면 재생성 생략(느린 트리거가 뒤늦게 팝업을 깜빡이게 하는 것 방지)
      if (popupEl && selPopupText === text) return;
      selPopupText = text;
      const clientRects = Array.from(range.getClientRects()).filter((r) => r.width > 1 && r.height > 1);
      if (!clientRects.length) return;
      const last = clientRects[clientRects.length - 1];

      const pdfWrap = node.closest(".page-wrap");
      const rdPage = node.closest(".rd-page");

      if (pdfWrap) {
        // PDF 모드: 화면 좌표 → 페이지 정규화 좌표
        const pageNo = parseInt(pdfWrap.dataset.page, 10);
        const wr = pdfWrap.getBoundingClientRect();
        let norm = clientRects.map((r) => ({
          x: (r.left - wr.left) / wr.width, y: (r.top - wr.top) / wr.height,
          w: r.width / wr.width, h: r.height / wr.height,
        }));
        norm = mergeLineRects(norm);
        showColorPopup(last.left, last.bottom, (color) => createHighlight(pageNo, text, norm, color));
      } else if (rdPage) {
        // 읽기 모드: 블록 단위로 쪼개 각 블록의 PDF 좌표를 역산 (걸쳐선택 대응)
        const pageNo = parseInt(rdPage.dataset.page, 10);
        const built = buildReadingHighlight(pageNo, range);
        if (!built) { removePopup(); toast("PDF에서 위치를 못 찾았어요"); return; }
        showColorPopup(last.left, last.bottom, (color) =>
          createHighlight(pageNo, built.text, built.rects, color, built.segs));
      } else {
        removePopup();
      }
    }

    /* 두 모드 공통 하이라이트 생성. segs: 읽기 모드 다중 블록 조각(선택) */
    function createHighlight(pageNo, text, rects, color, segs) {
      const hl = { hid: "h_" + Date.now(), page: pageNo, text, rects: rects || [], color, created_at: nowKst() };
      if (segs && segs.length) hl.segs = segs;
      highlights.push(hl);
      // 새로 친 것 하나만 즉시 그림(전체 재렌더 X → 리포트가 커도 툭 끊기지 않음)
      if (mode === "reading") { wrapReading(hl); } else { renderOneHighlightPdf(hl); }
      const sel = window.getSelection();
      if (sel) sel.removeAllRanges();
      persist();
    }

    function mergeLineRects(rects) {
      rects.sort((a, b) => a.y - b.y || a.x - b.x);
      const out = [];
      for (const r of rects) {
        const prev = out[out.length - 1];
        if (prev && Math.abs(prev.y - r.y) < 0.008 && Math.abs(prev.h - r.h) < 0.01) {
          const right = Math.max(prev.x + prev.w, r.x + r.w);
          prev.x = Math.min(prev.x, r.x);
          prev.w = right - prev.x;
        } else {
          out.push({ ...r });
        }
      }
      return out;
    }

    function showColorPopup(cx, cy, onPick, protect) {
      removePopup();
      const p = document.createElement("div");
      p.className = "hl-popup";
      p._protect = !!protect;   // 캡처 팝업: 선택 변화(mouseup/touchend→onSelectionEnd)로 닫히지 않게
      const W = 172, H = 42;
      const left = Math.max(8, Math.min(cx, window.innerWidth - W - 8));
      let top = cy + 10;
      if (top + H > window.innerHeight - 8) top = Math.max(8, cy - H - 14);
      p.style.left = left + "px";
      p.style.top = top + "px";
      p.innerHTML = COLORS.map((c) => `<div class="swatch ${c}" data-c="${c}"></div>`).join("") +
        `<div class="swatch del" data-c="cancel">✕</div>`;
      document.body.appendChild(p);
      popupEl = p;
      let done = false;
      p.querySelectorAll(".swatch").forEach((s) => {
        const pick = (e) => {
          if (done) return; done = true;
          e.preventDefault(); e.stopPropagation();
          const c = s.dataset.c;
          removePopup();
          if (c !== "cancel") onPick(c);
        };
        s.addEventListener("touchend", pick, { passive: false });
        s.addEventListener("click", pick);
      });
    }

    /* 하이라이트 1개 삭제 (팝업/더블탭 공통) */
    function removeHighlight(hid) {
      if (deletedHids.has(hid)) return;
      highlights = highlights.filter((h) => h.hid !== hid);
      deletedHids.add(hid);
      if (mode === "reading") { renderReadingHighlights(); } else { rerenderAllHighlights(); }
      persist();
    }

    function showDeletePopup(hl, cx, cy) {
      if (deletedHids.has(hl.hid)) return;   // 이미 지워진 하이라이트면 무시
      removePopup();
      const p = document.createElement("div");
      p.className = "hl-popup";
      p.style.left = Math.max(8, Math.min(cx - 20, window.innerWidth - 96)) + "px";
      p.style.top = Math.min(cy + 8, window.innerHeight - 50) + "px";
      p.innerHTML = `<div class="swatch del" data-a="del" style="width:auto;padding:0 12px">🗑 삭제</div>`;
      document.body.appendChild(p);
      popupEl = p;
      let done = false;
      const del = (e) => {
        if (done) return; done = true;
        e.preventDefault(); e.stopPropagation();
        removePopup();
        removeHighlight(hl.hid);
      };
      const b = p.querySelector("[data-a='del']");
      b.addEventListener("touchend", del, { passive: false });
      b.addEventListener("click", del);
    }

    /* ── 저장 (낙관적 UI) ── */
    let saving = false, dirty = false;
    async function persist() {
      dirty = true;
      if (saving) return;
      saving = true;
      while (dirty) {
        dirty = false;
        try {
          const res = await saveAnnotations(REPORT_ID, highlights, deletedHids, annoSha);
          annoSha = res.sha;
          await bumpCount(REPORT_ID, highlights.length);   // 완료까지 대기(뒤로가기로 끊기지 않게)
        } catch (err) {
          if (err instanceof AuthError) { saving = false; handleError(err, () => {}); return; }
          toast("저장 실패 — 다시 시도합니다");
          dirty = true;
          await new Promise((r) => setTimeout(r, 1500));
        }
      }
      saving = false;
      toast("저장됨");
    }

    /* reports.json의 highlight_count 즉시 갱신 (비필수 — 실패해도 collect의 recount가 보정).
       sha 충돌(409/422) 시 최신 재조회 후 1회 재시도. PUT 성공 여부를 반드시 확인. */
    async function bumpCount(reportId, count) {
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const res = await ghFetch("contents/index/reports.json", { cache: "no-store" });
          if (!res.ok) return;
          const obj = await res.json();
          const doc = JSON.parse(decodeB64Utf8(obj.content));
          const r = (doc.reports || []).find((x) => x.id === reportId);
          if (!r || r.highlight_count === count) return;
          r.highlight_count = count;
          const put = await ghFetch("contents/index/reports.json", {
            method: "PUT",
            body: {
              message: `count: ${reportId} ${count}`,
              content: encodeUtf8B64(JSON.stringify(doc, null, 2)),
              sha: obj.sha,
            },
          });
          if (put.ok) return;
          if (put.status !== 409 && put.status !== 422) {
            console.warn("count 갱신 실패", put.status); return;   // 충돌 외 오류는 recount에 맡김
          }
          // 충돌이면 루프 재시도(최신 sha 재조회)
        } catch (e) { console.warn("count 갱신 생략", e); return; }
      }
    }

    /* 특정 하이라이트로 스크롤 + 잠깐 강조. 요소가 아직 없으면 페이지로 폴백. */
    function gotoHighlight(hid, fallbackPage) {
      const sel = (mode === "reading")
        ? `#readingContainer mark.rd-hl[data-hid="${hid}"]`
        : `.hlLayer .hl-rect[data-hid="${hid}"]`;
      let el = document.querySelector(sel);
      if (!el && fallbackPage > 0) {
        el = (mode === "reading")
          ? document.querySelector(`#readingContainer .rd-page[data-page="${fallbackPage}"]`)
          : document.querySelector(`.page-wrap[data-page="${fallbackPage}"]`);
      }
      if (!el) return;
      el.scrollIntoView({ block: "center", behavior: "smooth" });
      const flashEl = el.closest("mark.rd-hl, .hl-rect, .rd-page, .page-wrap") || el;
      flashEl.classList.add("hl-flash");
      setTimeout(() => flashEl.classList.remove("hl-flash"), 1600);
    }

    /* ── 읽기 모드 (텍스트 리플로우) ── */
    async function setMode(m) {
      if (m === "reading" && !pdfDoc && !PRE) { toast("PDF 로딩 중…"); return; }
      mode = m;
      const pdfC = document.getElementById("pdfContainer");
      const rdC = document.getElementById("readingContainer");
      const btn = document.getElementById("modeBtn");
      if (m === "reading") {
        if (!readingBuilt) {
          rdC.innerHTML = `<div class="loading">읽기 화면 구성 중…</div>`;
          rdC.style.display = "";
          pdfC.style.display = "none";
          await buildReadingView();
          readingBuilt = true;
        } else {
          rdC.style.display = ""; pdfC.style.display = "none";
        }
        renderReadingHighlights();   // PDF에서 친 하이라이트 반영
        btn.textContent = "📄 PDF";
        document.getElementById("llmBtn").style.display = "";   // 읽기모드에서만 LLM 버튼
        ensureLlmState();
      } else {
        await ensurePdfRendered();   // 아직 렌더 안 했으면 지금 렌더
        rdC.style.display = "none"; pdfC.style.display = "";
        rerenderAllHighlights();     // 읽기에서 친 하이라이트 반영
        btn.textContent = "📖 읽기";
        document.getElementById("llmBtn").style.display = "none";
      }
      updateCaptureFab();   // PDF 모드에서만 위젯 표시(읽기 모드 진입 시 캡처 해제)
      window.scrollTo(0, 0);
    }

    async function buildReadingView() {
      const rdC = document.getElementById("readingContainer");
      rdC.innerHTML = "";
      for (let n = 1; n <= numPages(); n++) {
        if (PRE) buildPageReadingPre(n, rdC);           // 사전렌더: PDF 없이 좌표+본문으로
        else { const page = await pdfDoc.getPage(n); await buildPageReading(page, n, rdC); }
      }
      // 페이지 전체 이미지는 뷰포트 근처에 오면 지연 렌더(기본 펼침 상태)
      const io = new IntersectionObserver((entries, obs) => {
        for (const en of entries) {
          if (en.isIntersecting) { obs.unobserve(en.target); renderPageInto(en.target); }
        }
      }, { rootMargin: "800px 0px" });
      rdC.querySelectorAll(".rd-pageimg").forEach((w) => io.observe(w));
      rdC.querySelectorAll(".rd-capture").forEach((b) => {
        b.onclick = () => startCapture(parseInt(b.dataset.page, 10));
      });
    }

    function joinItems(its) {
      let out = "";
      for (let i = 0; i < its.length; i++) {
        if (i > 0) {
          const gap = its[i].x - its[i - 1].xr;
          const h = its[i].h || its[i - 1].h || 10;
          if (gap > h * 0.25) out += " ";   // 시각적 간격이 크면 띄어쓰기 복원(공백 아이템 없는 PDF 대비)
        }
        out += its[i].str;
      }
      return out.replace(/\s+/g, " ").trim();
    }

    /* 저해상 렌더로 각 줄의 텍스트 색을 샘플링 → 유채색(빨강/파랑 등)이면 ln.colored=true.
       broker 리포트의 색 소제목을 크기 대신 색으로 감지(본문은 검정, 소제목은 색). */
    async function markColoredLines(page, lines, W, H) {
      for (const ln of lines) ln.colored = false;
      try {
        const cw = 400, k = cw / W;
        const vp = page.getViewport({ scale: k });
        const cv = document.createElement("canvas");
        cv.width = Math.ceil(vp.width); cv.height = Math.ceil(vp.height);
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, cv.width, cv.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        for (const ln of lines) {
          const x0 = Math.max(0, Math.floor(Math.min(...ln.items.map((i) => i.x)) * k));
          const x1 = Math.min(cv.width, Math.ceil(Math.max(...ln.items.map((i) => i.xr)) * k));
          const y0 = Math.max(0, Math.floor(ln.y * k));
          const y1 = Math.min(cv.height, Math.ceil((ln.y + ln.h) * k));
          if (x1 <= x0 || y1 <= y0) continue;
          const data = ctx.getImageData(x0, y0, x1 - x0, y1 - y0).data;
          let ink = 0, colored = 0;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i + 1], b = data[i + 2];
            const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
            if (mx < 210) { ink++; if (mx - mn > 55) colored++; }   // 잉크 픽셀 중 유채색 비율
          }
          ln.colored = ink >= 5 && colored >= ink * 0.33;
        }
      } catch (e) { /* 실패 시 색 기준 없이(크기만) */ }
    }

    /* 사전 렌더 읽기 페이지: PDF 없이 이미지 자리 + 저장된 본문(READTEXT)만 (pageItems는 start에서 좌표로 채움) */
    function buildPageReadingPre(pageNo, container) {
      const pg = PRE[String(pageNo)] || { w: 1, h: 1.414 };
      pageSnap[pageNo] = pageSnap[pageNo] || [];
      const imgH = Math.round(Math.min(window.innerWidth - 36, 820) * pg.h / pg.w);
      let html = `<div class="rd-pageno">p.${pageNo}</div>`;
      html += `<div class="rd-pageimg" data-page="${pageNo}" style="min-height:${imgH}px"></div>`;
      html += `<button class="rd-capture" data-page="${pageNo}">✂️ 이미지 캡처</button>`;
      const pre = READTEXT ? (READTEXT[String(pageNo)] || []) : [];
      for (const b of pre) {
        if (b.kind === "sub") html += `<h3 class="rd-h rd-sub">${esc(b.text)}</h3>`;
        else if (b.kind !== "p") html += `<h3 class="rd-h">${esc(b.text)}</h3>`;
        else html += `<p class="rd-para">${esc(b.text)}</p>`;
      }
      container.insertAdjacentHTML("beforeend", `<div class="rd-page" data-page="${pageNo}">${html}</div>`);
    }

    async function buildPageReading(page, pageNo, container) {
      const vp = page.getViewport({ scale: 1 });
      const W = vp.width;
      const tc = await page.getTextContent();
      const raw = [];
      const items = [];
      for (const it of tc.items) {
        if (!it.str) continue;                 // 공백 아이템도 유지 → 단어 사이 띄어쓰기 보존
        const tx = pdfjsLib.Util.transform(vp.transform, it.transform);
        const fh = Math.hypot(tx[2], tx[3]);
        if (fh === 0) continue;                // 높이 0 아이템 제외(줄묶기 안정)
        const w = it.width || 0;
        raw.push({ str: it.str, x: tx[4], xr: tx[4] + w, y: tx[5] - fh, h: fh });
        items.push({ str: it.str, x: tx[4] / W, y: (tx[5] - fh) / vp.height, w: w / W, h: fh / vp.height });
      }
      pageItems[pageNo] = items;
      pageSnap[pageNo] = [];
      if (!raw.length) {
        const imgH0 = Math.round(Math.min(window.innerWidth - 36, 820) * vp.height / vp.width);
        container.insertAdjacentHTML("beforeend",
          `<div class="rd-page" data-page="${pageNo}"><div class="rd-pageno">p.${pageNo}</div>` +
          `<div class="rd-pageimg" data-page="${pageNo}" style="min-height:${imgH0}px"></div>` +
          `<button class="rd-capture" data-page="${pageNo}">✂️ 이미지 캡처</button></div>`);
        return;
      }

      let els = [];
      const pre = READTEXT ? (READTEXT[String(pageNo)] || []) : null;
      if (pre !== null) {
        // 수집 시 PyMuPDF로 추출·저장한 본문 사용 → 브라우저 heuristic(색감지 렌더·컬럼·사이드바) 전부 스킵.
        // 빈 배열이면 그림/목차 페이지 → 본문 없이 페이지 이미지만.
        els = pre.map((b, i) => ({ y: i, kind: b.kind === "p" ? "p" : "h", sub: b.kind === "sub", text: b.text }));
        pageSnap[pageNo] = [];
      } else {
      const lines = groupLines(raw);
      for (const ln of lines) ln.text = joinItems(ln.items);
      await markColoredLines(page, lines, W, vp.height);   // 색 소제목 감지

      // 캡션(표N/그림N)~자료: 구간을 표/그림으로 인식 → 본문에서 제외하고 이미지로
      const figBands = detectCaptionFigures(lines, vp.height);
      const inFig = (y) => figBands.some((b) => y >= b.top - 1 && y <= b.bottom + 1);
      const textLines = lines.filter((ln) => !inFig(ln.y + ln.h / 2));

      // 우측 데이터 사이드바(기업코멘트: 좌=본문, 우=Buy/재무 박스) 감지
      const sb = detectRightSidebar(raw, W, vp.height);
      // 캡처 탭 스냅 후보: 표/그림 밴드(전폭) + 우측 데이터 박스 (정규화)
      const snaps = figBands.map((b) => ({ x: 0, y: b.top / vp.height, w: 1, h: (b.bottom - b.top) / vp.height }));
      if (sb) snaps.push({ x: sb.x / W, y: sb.top / vp.height, w: (W - sb.x) / W, h: (sb.bot - sb.top) / vp.height });
      pageSnap[pageNo] = snaps;
      if (sb) {
        // 사이드밴드의 우측 아이템 제거 → 좌측 본문만 깨끗이 리플로우
        const flowRaw = raw.filter((it) => {
          const cy = it.y + it.h / 2;
          if (inFig(cy)) return false;
          if (cy >= sb.top && cy <= sb.bot && (it.x + it.xr) / 2 >= sb.x) return false;
          return true;
        });
        const flowLines = groupLines(flowRaw);
        for (const ln of flowLines) ln.text = joinItems(ln.items);
        els = paraBlocks(flowLines.map((l) => ({ y: l.y, h: l.h, text: l.text })))
          .map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text }));
      } else {
        const colX = detectColumnSplit(textLines, W);
        // detectColumnSplit이 놓친 '왼쪽 여백 주석' 레이아웃 보완
        const leftGx = (colX == null) ? detectLeftGutter(raw, W) : null;
        if (leftGx != null) {
          // 왼쪽 여백 주석 → 오른쪽 본문만 살림 (colX<0.34 경로와 동일)
          const left = [], right = [];
          for (const ln of textLines) splitLine(ln, leftGx, left, right);
          els = paraBlocks(right).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text, sub: b.colored }));
        } else if (colX == null) {
          const arr = textLines.map((ln) => ({ y: ln.y, h: ln.h, text: ln.text, colored: ln.colored }));
          els = paraBlocks(arr).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text, sub: b.colored }));
        } else if (colX < W * 0.34) {
          // 왼쪽 요약 사이드바 + 오른쪽 본문 → 본문 우선: 오른쪽 본문만 살림(요약 라벨은 애매해서 생략)
          const left = [], right = [];
          for (const ln of textLines) splitLine(ln, colX, left, right);
          els = paraBlocks(right).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text, sub: b.colored }));
        } else {
          // 2단 본문: 왼쪽 컬럼 먼저(그대로), 오른쪽은 뒤로 (y에 큰 오프셋)
          const left = [], right = [];
          for (const ln of textLines) splitLine(ln, colX, left, right);
          els = paraBlocks(left).map((b) => ({ y: b.y, kind: b.heading ? "h" : "p", text: b.text, sub: b.colored }))
            .concat(paraBlocks(right).map((b) => ({ y: 1e9 + b.y, kind: b.heading ? "h" : "p", text: b.text, sub: b.colored })));
        }
      }
      }  // end else(브라우저 heuristic 추출)

      // 표/그림은 따로 잘라오지 않음 — 페이지 전체 이미지를 맨 위에 두고 본문 텍스트만 리플로우
      els.sort((a, b) => a.y - b.y);
      const imgH = Math.round(Math.min(window.innerWidth - 36, 820) * vp.height / vp.width);
      let html = `<div class="rd-pageno">p.${pageNo}</div>`;
      html += `<div class="rd-pageimg" data-page="${pageNo}" style="min-height:${imgH}px"></div>`;
      html += `<button class="rd-capture" data-page="${pageNo}">✂️ 이미지 캡처</button>`;
      for (const b of els) {
        if (b.kind === "label") html += `<h4 class="rd-label">${esc(b.text)}</h4>`;
        else if (b.kind === "h") html += `<h3 class="rd-h${b.sub ? " rd-sub" : ""}">${esc(b.text)}</h3>`;
        else html += `<p class="rd-para">${esc(b.text)}</p>`;
      }
      container.insertAdjacentHTML("beforeend", `<div class="rd-page" data-page="${pageNo}">${html}</div>`);
    }

    /* 줄 묶기 (y 근접) */
    function groupLines(raw) {
      raw.sort((a, b) => a.y - b.y || a.x - b.x);
      const lines = [];
      for (const r of raw) {
        const last = lines[lines.length - 1];
        if (last && Math.abs(last.y - r.y) < r.h * 0.6) { last.items.push(r); last.h = Math.max(last.h, r.h); }
        else lines.push({ y: r.y, h: r.h, items: [r] });
      }
      for (const ln of lines) ln.items.sort((a, b) => a.x - b.x);
      return lines;
    }

    /* 컬럼 경계 감지: 여러 줄에서 일관된 세로 여백(거터)이 있으면 그 x를 반환, 없으면 null */
    function detectColumnSplit(lines, W) {
      const cand = [];
      for (const ln of lines) {
        const its = ln.items;
        for (let i = 0; i < its.length - 1; i++) {
          const gap = its[i + 1].x - its[i].xr;
          if (gap > 0.06 * W) cand.push((its[i].xr + its[i + 1].x) / 2);
        }
      }
      if (cand.length < 3) return null;
      cand.sort((a, b) => a - b);
      const mid = cand[Math.floor(cand.length / 2)];
      const near = cand.filter((c) => Math.abs(c - mid) < 0.04 * W).length;
      if (near < 3 || near < cand.length * 0.4) return null;
      let crossing = 0;
      for (const ln of lines) {
        if (ln.items.some((it) => it.xr < mid) && ln.items.some((it) => it.x > mid)) crossing++;
      }
      if (crossing < 3) return null;
      return mid;
    }

    /* 왼쪽 여백 주석/사이드바 감지: [0.15W,0.40W]에 아이템이 거의 안 걸치는 세로 거터가 있고,
       그 왼쪽에 좁은 텍스트 열(여백 주석)이 3줄 이상, 오른쪽에 본문이 충분하면 거터 x를 반환.
       detectColumnSplit(줄 내 gap·crossing 기준)이 놓치는 '여백 노트' 레이아웃 보완용. 아니면 null. */
    function detectLeftGutter(raw, W) {
      const delta = 3;
      let best = null;
      for (let f = 0.15; f <= 0.40; f += 0.005) {
        const gx = W * f;
        let straddle = 0, R = 0, leftMaxXr = 0;
        const leftYs = [];
        for (const it of raw) {
          if (it.x < gx - delta && it.xr > gx + delta) { straddle++; }
          else if (it.xr <= gx + delta) { leftYs.push(Math.round(it.y)); leftMaxXr = Math.max(leftMaxXr, it.xr); }
          else if (it.x >= gx - delta) { R++; }
        }
        if (straddle > 1) continue;                    // 거터를 가로지르는 통짜 본문이면 컬럼 아님
        if (new Set(leftYs).size < 3 || R < 20) continue;  // 왼쪽 열 3줄+ & 오른쪽 본문 충분
        if (leftMaxXr > 0.34 * W) continue;            // 왼쪽 열이 넓으면 2단 본문 → 제외(여백 노트만)
        if (best == null || R > best.R) best = { gx, R };
      }
      return best ? best.gx : null;
    }

    /* 아이템 묶음의 숫자 밀도 (0~1). 산문↔데이터 구분용 */
    function numDensity(items) {
      let digits = 0, chars = 0;
      for (const it of items) {
        const s = (it.str || "").replace(/\s/g, "");
        chars += s.length;
        digits += (s.match(/[0-9]/g) || []).length;
      }
      return chars ? digits / chars : 0;
    }

    /* 우측 데이터 사이드바 감지 (기업코멘트: 좌 본문 + 우 Buy/재무 박스).
       아이템 단위로 우측(0.55~0.72W)에 '세로로 긴 빈 스트립(거터)'이 있고,
       좌측=산문(<0.30) · 우측=데이터(>0.30)일 때만 {x, top, bot} 반환. 아니면 null. */
    function detectRightSidebar(raw, W, H) {
      const delta = 4;
      let best = null;
      for (let f = 0.55; f <= 0.72; f += 0.01) {
        const x = W * f;
        const ys = [];
        for (const it of raw) if (it.x < x + delta && it.xr > x - delta) ys.push(it.y + it.h / 2);
        ys.sort((a, b) => a - b);
        let top = 0, bot = 0, prev = 0;   // 최장 빈 y구간
        for (let k = 0; k <= ys.length; k++) {
          const y = (k < ys.length) ? ys[k] : H;
          if (y - prev > bot - top) { top = prev; bot = y; }
          prev = y;
        }
        if (bot - top <= H * 0.3) continue;
        let L = 0, R = 0;
        for (const it of raw) {
          const cy = it.y + it.h / 2;
          if (cy < top || cy > bot) continue;
          if (it.xr <= x) L++; else if (it.x >= x) R++;
        }
        if (L >= 15 && R >= 15 && (best == null || (bot - top) > (best.bot - best.top))) best = { x, top, bot };
      }
      if (!best) return null;
      const left = [], right = [];
      for (const it of raw) {
        const cy = it.y + it.h / 2;
        if (cy < best.top || cy > best.bot) continue;
        if (it.xr <= best.x) left.push(it); else if (it.x >= best.x) right.push(it);
      }
      if (numDensity(left) >= 0.30) return null;    // 좌측도 표(재무제표 등) → 미적용
      if (numDensity(right) <= 0.30) return null;    // 우측이 데이터 아님 → 미적용
      return best;
    }

    /* 한 줄을 컬럼 경계로 좌/우로 분리 */
    function splitLine(ln, colX, left, right) {
      const L = ln.items.filter((it) => (it.x + it.xr) / 2 < colX);
      const R = ln.items.filter((it) => (it.x + it.xr) / 2 >= colX);
      if (L.length) left.push({ y: ln.y, h: Math.max(...L.map((i) => i.h)), text: joinItems(L), colored: ln.colored });
      if (R.length) right.push({ y: ln.y, h: Math.max(...R.map((i) => i.h)), text: joinItems(R), colored: ln.colored });
    }

    /* 세로 간격 작은 줄들을 한 블록(라벨)으로 */
    function blockLines(arr, gapFactor) {
      const blocks = [];
      let prevY = null, prevH = null, cur = null;
      for (const ln of arr) {
        if (!ln.text) continue;
        if (cur && prevY != null && (ln.y - prevY) < prevH * gapFactor) { cur.text += " " + ln.text; cur.h = Math.max(cur.h, ln.h); }
        else { cur = { y: ln.y, h: ln.h, text: ln.text }; blocks.push(cur); }
        prevY = ln.y; prevH = ln.h;
      }
      return blocks;
    }

    /* 본문 문단 블록 (+ 폰트 크기로 제목 감지) */
    function paraBlocks(arr) {
      const texts = arr.filter((l) => l.text);
      if (!texts.length) return [];
      const hs = texts.map((l) => l.h).sort((a, b) => a - b);
      const body = hs[Math.floor(hs.length / 2)] || 10;
      const blocks = [];
      let cur = null, prevY = null, prevH = body;
      for (const ln of texts) {
        const heading = ln.colored || ln.h > body * 1.35;   // 색 소제목도 제목으로
        const gap = prevY == null ? 0 : ln.y - prevY;
        if (heading) {
          const last = blocks[blocks.length - 1];
          if (last && last.heading && last.colored && ln.colored && gap < prevH * 1.8) {
            last.text += " " + ln.text;   // 여러 줄 색 소제목 병합
          } else {
            blocks.push({ y: ln.y, heading: true, colored: !!ln.colored, text: ln.text });
          }
          cur = null;
        } else {
          if (!cur || (prevY != null && gap > prevH * 1.9)) { cur = { y: ln.y, heading: false, text: ln.text }; blocks.push(cur); }
          else cur.text += " " + ln.text;
        }
        prevY = ln.y; prevH = ln.h;
      }
      return blocks;
    }

    function renderBlocks(blocks) {
      let html = "";
      for (const b of blocks) html += b.heading ? `<h3 class="rd-h">${esc(b.text)}</h3>` : `<p class="rd-para">${esc(b.text)}</p>`;
      return html;
    }

    /* 캡션(표N/그림N)부터 자료: 줄까지를 표/그림 영역으로 인식 */
    function detectCaptionFigures(lines, H) {
      const capRe = /^\s*[<\[【(]?\s*(그림|표|차트|도표|Figure|Fig|Table|Chart|Exhibit)\s*[-.]?\s*\d+(?!\s*(?:개|명|원|년|월|일|위|배|가지|%))/i;
      const unitRe = /\(\s*단위\s*[:：]/;  // "(단위: 원, %, 배 …)" → 대개 표 제목
      const srcRe = /^\s*(자료|출처|주|참고|Source|Note)\s*[:：]/;
      // cap=true: 「그림N/표N/차트N…」 명확한 캡션 → 원본 크롭 유지
      // cap=false: 「(단위:…)」만 있는 애매한 밴드 → 본문에서만 제외하고 '원본 참고' 노트로
      const caps = [];
      for (let i = 0; i < lines.length; i++) {
        const isCap = capRe.test(lines[i].text);
        if (isCap || unitRe.test(lines[i].text)) caps.push({ i, cap: isCap });
      }
      const bands = [];
      for (let k = 0; k < caps.length; k++) {
        const ci = caps[k].i;
        const nextCap = (k + 1 < caps.length) ? caps[k + 1].i : lines.length;
        const top = lines[ci].y;
        let bottom = null;
        for (let j = ci + 1; j < nextCap; j++) {
          if (srcRe.test(lines[j].text)) { bottom = lines[j].y + lines[j].h; break; }
        }
        if (bottom == null) {
          const lastJ = nextCap - 1;
          bottom = (lastJ > ci) ? (lines[lastJ].y + lines[lastJ].h) : (top + H * 0.08);
        }
        if (bottom - top > H * 0.03) bands.push({ top, bottom, captioned: caps[k].cap });
      }
      bands.sort((a, b) => a.top - b.top);
      const merged = [];
      for (const b of bands) {
        const last = merged[merged.length - 1];
        if (last && b.top <= last.bottom + 2) {
          last.bottom = Math.max(last.bottom, b.bottom);
          last.captioned = last.captioned || b.captioned;   // 하나라도 캡션 있으면 크롭 유지
        } else merged.push({ ...b });
      }
      return merged;
    }

    /* 지정 밴드들을 원본에서 잘라 dataURL 이미지로 반환 */
    async function cropBands(page, bands, W, H) {
      const cssW = Math.min(window.innerWidth - 40, 820);
      const scale = cssW / W;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const vp = page.getViewport({ scale });
      const full = document.createElement("canvas");
      full.width = Math.floor(vp.width * dpr);
      full.height = Math.floor(vp.height * dpr);
      const ctx = full.getContext("2d");
      ctx.scale(dpr, dpr);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      const out = [];
      for (const b of bands) {
        const pad = 3;
        const sy = Math.max(0, Math.floor((b.top - pad) * scale * dpr));
        const ey = Math.min(full.height, Math.ceil((b.bottom + pad) * scale * dpr));
        const sx = Math.max(0, Math.floor(((b.left || 0) - pad) * scale * dpr));
        const ex = Math.min(full.width, Math.ceil(((b.right != null ? b.right : W) + pad) * scale * dpr));
        const sh = ey - sy, sw = ex - sx;
        if (sh < 8 || sw < 8) continue;
        const crop = document.createElement("canvas");
        crop.width = sw; crop.height = sh;
        crop.getContext("2d").drawImage(full, sx, sy, sw, sh, 0, 0, sw, sh);
        out.push({ y: b.top, url: crop.toDataURL("image/jpeg", 0.82) });
      }
      return out;
    }

    /* 페이지를 화면폭 이미지 dataURL로 렌더 (표지용) */
    async function renderPageToDataURL(page, maxW) {
      const cssW = Math.min(window.innerWidth - 36, maxW || 820);
      const scale = cssW / page.getViewport({ scale: 1 }).width;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const vp = page.getViewport({ scale });
      const c = document.createElement("canvas");
      c.width = Math.floor(vp.width * dpr); c.height = Math.floor(vp.height * dpr);
      const ctx = c.getContext("2d"); ctx.scale(dpr, dpr);
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, vp.width, vp.height);   // JPEG는 알파 없음 → 안 칠해진 영역이 검게 나오지 않도록 흰 배경
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      return c.toDataURL("image/jpeg", 0.85);
    }

    /* 목록 카드용 1페이지 썸네일을 localStorage에 캐시 (이 기기에서 연 리포트만) */
    async function cacheThumb(id) {
      try {
        if (localStorage.getItem("rv_thumb_" + id)) return;
        const p1 = await pdfDoc.getPage(1);
        const scale = 200 / p1.getViewport({ scale: 1 }).width;
        const vp = p1.getViewport({ scale });
        const c = document.createElement("canvas");
        c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
        const tctx = c.getContext("2d");
        tctx.fillStyle = "#fff"; tctx.fillRect(0, 0, c.width, c.height);   // JPEG는 알파 없음 → 흰 배경
        await p1.render({ canvasContext: tctx, viewport: vp }).promise;
        localStorage.setItem("rv_thumb_" + id, c.toDataURL("image/jpeg", 0.7));
      } catch (e) { /* 용량초과 등 무시 */ }
    }

    /* 페이지 전체 이미지: 뷰포트 근처에서 지연 렌더(JPEG img). 이미지 탭 → 접힘(버튼), 버튼 → 펼침 */
    async function renderPageInto(wrap) {
      if (wrap._rendered || wrap._collapsed) return;
      wrap._rendered = true;
      const pageNo = parseInt(wrap.dataset.page, 10);
      try {
        if (PRE) {
          // 사전 렌더: 미리 구운 페이지 이미지 사용(PDF 불필요)
          const img = document.createElement("img");
          img.className = "rd-pagecanvas";
          img.alt = `p.${pageNo} 이미지`;
          img.addEventListener("click", () => collapseImg(wrap));
          img.src = await loadPageImage(pageNo);
          wrap.innerHTML = "";
          wrap.appendChild(img);
          wrap.style.minHeight = "";
          return;
        }
        const page = await pdfDoc.getPage(pageNo);
        const cssW = Math.min(window.innerWidth - 36, 820);
        const scale = cssW / page.getViewport({ scale: 1 }).width;
        const vp = page.getViewport({ scale });
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const canvas = document.createElement("canvas");
        canvas.width = Math.floor(vp.width * dpr);
        canvas.height = Math.floor(vp.height * dpr);
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, vp.width, vp.height);   // JPEG는 알파 없음 → 흰 배경 (안 그러면 여백이 검게)
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        // 라이브 캔버스는 메모리를 많이 먹으므로 JPEG로 바꿔 <img>로 (캔버스는 GC)
        const url = canvas.toDataURL("image/jpeg", 0.85);
        const img = document.createElement("img");
        img.className = "rd-pagecanvas";
        img.src = url;
        img.alt = `p.${pageNo} 이미지`;
        img.addEventListener("click", () => collapseImg(wrap));
        wrap.innerHTML = "";
        wrap.appendChild(img);
        wrap.style.minHeight = "";
      } catch (e) {
        wrap._rendered = false;   // 실패 시 다시 시도할 수 있게
      }
    }

    function collapseImg(wrap) {
      wrap._collapsed = true;
      wrap.style.minHeight = "";
      wrap.innerHTML = `<button class="rd-img-btn rd-imgtoggle">🖼 페이지 이미지 보기</button>`;
      wrap.querySelector(".rd-imgtoggle").addEventListener("click", (e) => {
        e.stopPropagation();
        expandImg(wrap);
      });
    }

    function expandImg(wrap) {
      wrap._collapsed = false;
      wrap._rendered = false;
      wrap.innerHTML = "";
      renderPageInto(wrap);
    }

    /* ── 이미지 캡처: 페이지 이미지에서 영역 선택 → clip 저장 → 이미지 하이라이트 ── */
    async function startCapture(pageNo) {
      const wrap = document.querySelector(`#readingContainer .rd-pageimg[data-page="${pageNo}"]`);
      if (!wrap) return;
      if (wrap._captureEls) { closeCapture(wrap); return; }   // 토글: 이미 열려 있으면 닫기
      // 이미지가 아직 없으면(접힘/미렌더) 먼저 렌더
      if (!wrap.querySelector("img.rd-pagecanvas")) {
        wrap._collapsed = false; wrap._rendered = false; wrap.innerHTML = "";
        await renderPageInto(wrap);
      }
      const img = wrap.querySelector("img.rd-pagecanvas");
      if (!img) { toast("이미지 준비 중이에요"); return; }
      openCaptureOverlay(pageNo, wrap);
    }

    function closeCapture(wrap) {
      if (wrap._captureEls) wrap._captureEls.forEach((el) => el.remove());
      wrap._captureEls = null;
      wrap.style.position = "";
    }

    function openCaptureOverlay(pageNo, wrap) {
      wrap.style.position = "relative";
      const ov = document.createElement("div");
      ov.className = "capture-overlay";
      const box = document.createElement("div");
      box.className = "capture-box";
      box.style.display = "none";
      ov.appendChild(box);
      const bar = document.createElement("div");
      bar.className = "capture-bar";
      bar.innerHTML = `<span>드래그로 영역 선택 · 표/그림은 탭</span><button class="capture-cancel">✕</button>`;
      wrap.appendChild(ov);
      wrap.appendChild(bar);
      bar.querySelector(".capture-cancel").onclick = () => closeCapture(wrap);
      wrap._captureEls = [ov, bar];

      const setBox = (x, y, w, h) => {
        box.style.left = x + "px"; box.style.top = y + "px";
        box.style.width = w + "px"; box.style.height = h + "px";
      };
      const xy = (e) => {
        const r = ov.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(r.width, e.clientX - r.left)),
          y: Math.max(0, Math.min(r.height, e.clientY - r.top)),
          W: r.width, H: r.height,
        };
      };
      let sx = 0, sy = 0, drawing = false, moved = false;
      ov.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        const p = xy(e); sx = p.x; sy = p.y; drawing = true; moved = false;
        box.style.display = "block"; setBox(sx, sy, 0, 0);
        ov.setPointerCapture(e.pointerId);
      });
      ov.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const p = xy(e);
        if (Math.abs(p.x - sx) > 6 || Math.abs(p.y - sy) > 6) moved = true;
        setBox(Math.min(sx, p.x), Math.min(sy, p.y), Math.abs(p.x - sx), Math.abs(p.y - sy));
      });
      ov.addEventListener("pointerup", (e) => {
        if (!drawing) return; drawing = false;
        const r = ov.getBoundingClientRect();
        let rect = null;
        if (!moved) {
          // 탭 → 그 지점을 포함하는 표/그림 밴드로 스냅
          const px = sx / r.width, py = sy / r.height;
          const s = (pageSnap[pageNo] || []).find((z) => px >= z.x && px <= z.x + z.w && py >= z.y && py <= z.y + z.h);
          if (!s) { box.style.display = "none"; toast("표/그림 위를 탭하거나 드래그하세요"); return; }
          rect = s;
          setBox(s.x * r.width, s.y * r.height, s.w * r.width, s.h * r.height);
        } else {
          const bw = parseFloat(box.style.width), bh = parseFloat(box.style.height);
          if (bw < 12 || bh < 12) { box.style.display = "none"; return; }
          rect = { x: parseFloat(box.style.left) / r.width, y: parseFloat(box.style.top) / r.height,
                   w: bw / r.width, h: bh / r.height };
        }
        const br = box.getBoundingClientRect();
        showColorPopup(br.left + br.width / 2, br.bottom, (color) => {
          closeCapture(wrap);
          captureRegion(pageNo, rect, color);
        }, true);
      });
    }

    /* 선택 영역만 PDF에서 고배율 렌더 → JPEG blob */
    async function renderRegionBlob(pageNo, rect) {
      if (PRE) {
        // 사전 렌더: 미리 구운 페이지 이미지에서 영역만 잘라냄(PDF 불필요)
        const url = await loadPageImage(pageNo);
        const im = await new Promise((res, rej) => {
          const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = url;
        });
        const sx = Math.max(0, Math.round(rect.x * im.naturalWidth));
        const sy = Math.max(0, Math.round(rect.y * im.naturalHeight));
        const sw = Math.max(1, Math.round(rect.w * im.naturalWidth));
        const sh = Math.max(1, Math.round(rect.h * im.naturalHeight));
        const canvas = document.createElement("canvas");
        canvas.width = sw; canvas.height = sh;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, sw, sh);
        ctx.drawImage(im, sx, sy, sw, sh, 0, 0, sw, sh);
        return await new Promise((res) => canvas.toBlob((b) => res(b), "image/jpeg", 0.88));
      }
      const page = await pdfDoc.getPage(pageNo);
      const base = page.getViewport({ scale: 1 });
      const cropWpts = Math.max(1, rect.w * base.width);
      const scale = Math.max(1.5, Math.min(5, 1200 / cropWpts));
      const full = page.getViewport({ scale });
      const rx = rect.x * full.width, ry = rect.y * full.height;
      const rw = Math.max(1, Math.round(rect.w * full.width));
      const rh = Math.max(1, Math.round(rect.h * full.height));
      const vp = page.getViewport({ scale, offsetX: -rx, offsetY: -ry });
      const canvas = document.createElement("canvas");
      canvas.width = rw; canvas.height = rh;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, rw, rh);   // JPEG는 알파 없음
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      return await new Promise((res) => canvas.toBlob((b) => res(b), "image/jpeg", 0.85));
    }

    async function captureRegion(pageNo, rect, color) {
      const hid = "h_" + Date.now();
      const clip = `clips/${REPORT_ID}/${hid}.jpg`;
      const hl = { hid, page: pageNo, type: "image", rects: [rect], clip, color, created_at: nowKst() };
      // 낙관적: 캡처 흔적을 '즉시' 표시(업로드 끝나기 전에도 바로 보이게) + 잠깐 반짝임
      highlights.push(hl);
      if (mode === "pdf") { renderOneHighlightPdf(hl); flashCaptured(hid); }
      toast("캡처 저장 중…");
      try {
        const blob = await renderRegionBlob(pageNo, rect);
        await putBinaryFile(clip, blob, `clip: ${REPORT_ID} ${hid}`);
        persist();
        toast("✂️ 캡처됨 · 모아보기에서 확인");
      } catch (e) {
        console.error(e);
        // 업로드 실패 → 방금 추가한 캡처 롤백
        highlights = highlights.filter((h) => h.hid !== hid);
        if (mode === "pdf") rerenderAllHighlights();
        toast("캡처 저장 실패 — 다시 시도해 주세요");
      }
    }

    /* 방금 만든 캡처 박스를 잠깐 반짝여 눈에 띄게 */
    function flashCaptured(hid) {
      document.querySelectorAll(`.hl-rect[data-hid="${hid}"]`).forEach((el) => {
        el.classList.add("just-captured");
        setTimeout(() => el.classList.remove("just-captured"), 1400);
      });
    }

    /* ── PDF 모드 이미지 캡처 (우상단 위젯 → 아무 페이지나 드래그) ── */
    let pdfCaptureOn = false;
    let pdfCaptureEls = [];

    /* PDF 모드 & 렌더 완료면 위젯 표시, 아니면 숨김(+캡처 모드 해제) */
    function updateCaptureFab() {
      const fab = document.getElementById("captureFab");
      const hasPages = !!document.querySelector("#pdfContainer .page-wrap");
      if (mode === "pdf" && hasPages) { fab.style.display = ""; positionCaptureFab(); }
      else { fab.style.display = "none"; if (pdfCaptureOn) exitPdfCapture(); }
    }

    /* 위젯을 리포트 페이지의 오른쪽 상단 모서리에 맞춰 붙임(화면 맨끝 여백이 아니라) */
    function positionCaptureFab() {
      const fab = document.getElementById("captureFab");
      if (fab.style.display === "none") return;
      const page = document.querySelector("#pdfContainer .page-wrap");
      if (!page) return;
      const r = page.getBoundingClientRect();
      fab.style.right = Math.max(8, Math.round(window.innerWidth - r.right - 6)) + "px";
    }
    window.addEventListener("resize", positionCaptureFab);

    function togglePdfCapture() { pdfCaptureOn ? exitPdfCapture() : enterPdfCapture(); }

    function enterPdfCapture() {
      if (mode !== "pdf") return;
      pdfCaptureOn = true;
      document.getElementById("captureFab").classList.add("active");
      document.getElementById("captureHint").style.display = "";
      document.body.classList.add("capturing");
      removePopup();
      // 모든 PDF 페이지에 크로스헤어 오버레이 → 어느 페이지에서 드래그해도 캡처
      document.querySelectorAll("#pdfContainer .page-wrap").forEach((wrap) => {
        const pageNo = parseInt(wrap.dataset.page, 10);
        const ov = document.createElement("div");
        ov.className = "capture-overlay";
        const box = document.createElement("div");
        box.className = "capture-box";
        box.style.display = "none";
        ov.appendChild(box);
        wrap.appendChild(ov);
        pdfCaptureEls.push(ov);
        wireCaptureDrag(ov, box, pageNo);
      });
    }

    function exitPdfCapture() {
      pdfCaptureOn = false;
      pdfCaptureEls.forEach((el) => el.remove());
      pdfCaptureEls = [];
      document.getElementById("captureFab").classList.remove("active");
      document.getElementById("captureHint").style.display = "none";
      document.body.classList.remove("capturing");
    }

    /* 오버레이 드래그 → 정규화 rect → 색 선택 → captureRegion(공용 저장) */
    function wireCaptureDrag(ov, box, pageNo) {
      const setBox = (x, y, w, h) => {
        box.style.left = x + "px"; box.style.top = y + "px";
        box.style.width = w + "px"; box.style.height = h + "px";
      };
      const xy = (e) => {
        const r = ov.getBoundingClientRect();
        return { x: Math.max(0, Math.min(r.width, e.clientX - r.left)),
                 y: Math.max(0, Math.min(r.height, e.clientY - r.top)) };
      };
      let sx = 0, sy = 0, drawing = false, moved = false;
      ov.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        const p = xy(e); sx = p.x; sy = p.y; drawing = true; moved = false;
        box.style.display = "block"; setBox(sx, sy, 0, 0);
        ov.setPointerCapture(e.pointerId);
      });
      ov.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const p = xy(e);
        if (Math.abs(p.x - sx) > 6 || Math.abs(p.y - sy) > 6) moved = true;
        setBox(Math.min(sx, p.x), Math.min(sy, p.y), Math.abs(p.x - sx), Math.abs(p.y - sy));
      });
      ov.addEventListener("pointerup", (e) => {
        if (!drawing) return; drawing = false;
        const r = ov.getBoundingClientRect();
        const bw = parseFloat(box.style.width) || 0, bh = parseFloat(box.style.height) || 0;
        if (!moved || bw < 12 || bh < 12) { box.style.display = "none"; return; }
        const rect = { x: parseFloat(box.style.left) / r.width, y: parseFloat(box.style.top) / r.height,
                       w: bw / r.width, h: bh / r.height };
        const br = box.getBoundingClientRect();
        exitPdfCapture();
        showColorPopup(br.left + br.width / 2, br.bottom, (color) => captureRegion(pageNo, rect, color), true);
      });
    }

    document.getElementById("captureFab").onclick = togglePdfCapture;
    document.getElementById("captureHintX").onclick = exitPdfCapture;

    /* ── 온디맨드 LLM 본문 재추출 (읽기모드 버튼 → 큐 → 집 PC 처리) ── */
    const LLM_REQ = "contents/index/llm_requests.json";
    function renderLlmBtn() {
      const b = document.getElementById("llmBtn");
      if (llmQueued) { b.textContent = "⏳ 처리 대기중"; b.disabled = true; }
      else if (llmEngine === "llm") { b.textContent = "✅ LLM 본문"; b.disabled = false; }
      else { b.textContent = "🤖 LLM 정리"; b.disabled = false; }
    }
    async function llmPending() {
      try {
        const res = await ghFetch(LLM_REQ, { cache: "no-store" });
        if (!res.ok) return [];
        return (JSON.parse(decodeB64Utf8((await res.json()).content)).pending) || [];
      } catch (e) { return []; }
    }
    async function llmFetchEngine() {
      try {
        const res = await ghFetch("contents/index/reports.json", { cache: "no-store" });
        if (!res.ok) return llmEngine;
        const r = (JSON.parse(decodeB64Utf8((await res.json()).content)).reports || []).find((x) => x.id === REPORT_ID);
        return r ? (r.text_engine || null) : llmEngine;
      } catch (e) { return llmEngine; }
    }
    async function requestLlm() {
      for (let a = 0; a < 4; a++) {
        const res = await ghFetch(LLM_REQ, { cache: "no-store" });
        let doc = { pending: [], done: [] }, sha = null;
        if (res.ok) { const obj = await res.json(); doc = JSON.parse(decodeB64Utf8(obj.content)); sha = obj.sha; }
        doc.pending = doc.pending || [];
        if (!doc.pending.some((p) => (p.id || p) === REPORT_ID)) doc.pending.push({ id: REPORT_ID, requested_at: nowKst() });
        const body = { message: `llm-req: ${REPORT_ID}`, content: encodeUtf8B64(JSON.stringify(doc, null, 2)) };
        if (sha) body.sha = sha;
        const put = await ghFetch(LLM_REQ, { method: "PUT", body });
        if (put.ok) return;
        if (put.status !== 409 && put.status !== 422) throw new Error("요청 실패 " + put.status);
      }
      throw new Error("요청 충돌(잠시 후 다시)");
    }
    function startLlmPoll() {
      clearInterval(llmPoll);
      llmPoll = setInterval(async () => {
        const pend = await llmPending();
        if (!pend.some((p) => (p.id || p) === REPORT_ID)) {
          clearInterval(llmPoll);
          llmQueued = false;
          llmEngine = await llmFetchEngine();
          renderLlmBtn();
          toast(llmEngine === "llm" ? "✅ 본문 정리 완료 — 새로고침하면 반영" : "처리 완료");
        }
      }, 25000);   // 25초마다 상태 확인(집 PC는 3분 주기 처리)
    }
    async function ensureLlmState() {
      renderLlmBtn();
      if (llmChecked) return;
      llmChecked = true;
      const pend = await llmPending();
      llmQueued = pend.some((p) => (p.id || p) === REPORT_ID);
      renderLlmBtn();
      if (llmQueued) startLlmPoll();
    }
    document.getElementById("llmBtn").onclick = async () => {
      if (llmQueued) return;
      if (llmEngine === "llm" && !confirm("이미 LLM으로 정리된 본문이에요. 다시 정리를 요청할까요?")) return;
      const b = document.getElementById("llmBtn"); b.disabled = true;
      try {
        await requestLlm();
        llmQueued = true; renderLlmBtn();
        toast("요청됨 · 몇 분 내 본문에 반영돼요(완료 후 새로고침)");
        startLlmPoll();
      } catch (e) { toast(e.message || "요청 실패"); renderLlmBtn(); }
    };

    /* ── 읽기 모드 하이라이트 (텍스트 기준) ── */
    const NW = (s) => (s || "").replace(/\s+/g, "");        // 공백 제거 정규화
    const NS = (s) => (s || "").replace(/\s+/g, " ").trim(); // 공백 단일화

    const RD_SEL = ".rd-para, .rd-h, .rd-label";
    const escRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

    function clearReadingMarks() {
      const rdC = document.getElementById("readingContainer");
      rdC.querySelectorAll("mark.rd-hl").forEach((m) => m.replaceWith(document.createTextNode(m.textContent)));
      rdC.querySelectorAll(RD_SEL).forEach((b) => b.normalize());
    }

    function renderReadingHighlights() {
      if (!readingBuilt) return;
      clearReadingMarks();
      for (const hl of highlights) wrapReading(hl);
    }

    /* 텍스트 노드의 [idx, idx+len)을 mark로 감싼다 */
    function wrapRange(node, idx, len, hl) {
      const r = document.createRange();
      r.setStart(node, idx);
      r.setEnd(node, idx + len);
      const mark = document.createElement("mark");
      mark.className = "rd-hl " + (hl.color || "yellow");
      mark.dataset.hid = hl.hid;
      try {
        r.surroundContents(mark);
        mark.addEventListener("click", (e) => { e.stopPropagation(); showDeletePopup(hl, e.clientX, e.clientY); });
        return true;
      } catch (e) { return false; }   // 경계가 여러 노드에 걸치면 스킵
    }

    /* 읽기 화면에서 hl을 <mark>로 감싼다. segs가 있으면 조각별, 없으면 text 전체.
       각 조각은 해당 블록의 '텍스트 노드'에서 정확히 찾아 감싼다.
       (블록에 이미 마크가 있으면 텍스트 노드가 여러 개로 쪼개지므로 전부 순회) */
    function wrapReading(hl) {
      const page = document.querySelector(`#readingContainer .rd-page[data-page="${hl.page}"]`);
      if (!page) return false;
      // 읽기모드에서 친 건 블록별 segs가 있음. PDF에서 친 건 통짜 text라
      // 여러 블록에 걸치면 한 덩어리로 못 찾음 → rects로 줄 단위 조각을 복원해 매칭.
      const targets = (hl.segs && hl.segs.length) ? hl.segs : segsFromRects(hl);
      let any = false;
      for (const seg of targets) {
        const t = NS(seg);
        if (t && wrapSeg(page, t, hl)) any = true;
      }
      return any;
    }

    /* segs 없는(PDF에서 친) 하이라이트를 rects+pageItems로 줄 단위 텍스트 조각으로 복원.
       각 rect(≈한 줄)에 중심이 들어오는 글자 스팬들을 모아 그 줄의 텍스트를 만든다. */
    function segsFromRects(hl) {
      const items = pageItems[hl.page];
      if (!hl.rects || !hl.rects.length || !items || !items.length) return [hl.text];
      const runs = [];
      for (const r of hl.rects) {
        const inside = items.filter((it) => {
          const cx = it.x + it.w / 2, cy = it.y + it.h / 2;
          return cx >= r.x - 0.01 && cx <= r.x + r.w + 0.01 && cy >= r.y - 0.004 && cy <= r.y + r.h + 0.004;
        });
        const txt = inside.map((it) => it.str).join("").trim();
        if (txt) runs.push(txt);
      }
      return runs.length ? runs : [hl.text];
    }

    /* 블록들의 텍스트 노드에서 t를 찾아(공백 차이 무시) 첫 위치를 감싼다.
       firstChild만 보지 않고 마크 사이로 쪼개진 텍스트 노드까지 모두 순회 →
       이미 밑줄 친 문단에서 새로 칠해도 아래로 처지지 않음 */
    function wrapSeg(page, t, hl) {
      let re;
      try { re = new RegExp(t.split(/\s+/).map(escRe).join("\\s*")); }
      catch (e) { return false; }
      for (const b of page.querySelectorAll(RD_SEL)) {
        for (const node of b.childNodes) {
          if (node.nodeType !== 3) continue;   // 직속 텍스트 노드만 (마크 내부는 제외)
          const m = re.exec(node.textContent);
          if (m && m[0] && wrapRange(node, m.index, m[0].length, hl)) return true;
        }
      }
      return false;
    }

    /* 읽기 모드에서 고른 텍스트를 PDF 정규화 좌표로 역산 */
    function computeRectsFromText(pageNo, text) {
      const items = pageItems[pageNo];
      if (!items || !items.length) return [];
      const target = NW(text);
      if (!target) return [];
      let big = "";
      const map = [];
      items.forEach((it, ii) => {
        const s = NW(it.str);
        for (let k = 0; k < s.length; k++) { big += s[k]; map.push(ii); }
      });
      const pos = big.indexOf(target);
      if (pos < 0) return [];
      const from = map[pos], to = map[pos + target.length - 1];
      let rects = items.slice(from, to + 1).map((it) => ({ x: it.x, y: it.y, w: it.w, h: it.h }));
      return mergeLineRects(rects);
    }

    /* 읽기 모드 선택(range)을 블록 단위로 쪼개 각 블록의 PDF 좌표를 역산.
       선택 범위를 각 블록과 교차시켜 '실제 선택 텍스트'를 뽑는다(마크가 끼어 있어도 정확).
       좌표를 못 찾은 블록은 text·rects 양쪽에서 제외해 유령 항목을 방지.
       반환: { text, rects, segs } | null (하나도 못 찾음) */
    function buildReadingHighlight(pageNo, range) {
      const rdC = document.getElementById("readingContainer");
      const page = rdC.querySelector(`.rd-page[data-page="${pageNo}"]`);
      if (!page) return null;
      const segs = [];
      let allRects = [];
      for (const b of page.querySelectorAll(RD_SEL)) {
        if (!range.intersectsNode(b)) continue;
        // 선택 범위 ∩ 블록 = 이 블록에서 실제로 선택된 부분
        const br = document.createRange();
        br.selectNodeContents(b);
        const r = document.createRange();
        if (range.compareBoundaryPoints(Range.START_TO_START, br) >= 0) r.setStart(range.startContainer, range.startOffset);
        else r.setStart(br.startContainer, br.startOffset);
        if (range.compareBoundaryPoints(Range.END_TO_END, br) <= 0) r.setEnd(range.endContainer, range.endOffset);
        else r.setEnd(br.endContainer, br.endOffset);
        const sub = r.toString().trim();
        if (!sub) continue;
        const rects = computeRectsFromText(pageNo, sub);
        if (!rects.length) continue;          // 좌표 못 찾은 조각은 버림 (text↔rects 일치 보장)
        allRects = allRects.concat(rects);
        segs.push(sub);
      }
      if (!segs.length) return null;
      return { text: segs.join(" "), rects: mergeLineRects(allRects), segs };
    }

    document.getElementById("modeBtn").onclick = () => setMode(mode === "pdf" ? "reading" : "pdf");

    /* ── 더블탭/더블클릭 → 그 지점의 '문장'을 선택하고 색상 피커 표시 (읽기 모드) ── */
    function caretFromPoint(x, y) {
      if (document.caretRangeFromPoint) {
        const r = document.caretRangeFromPoint(x, y);
        return r ? { node: r.startContainer, offset: r.startOffset } : null;
      }
      if (document.caretPositionFromPoint) {
        const p = document.caretPositionFromPoint(x, y);
        return p ? { node: p.offsetNode, offset: p.offset } : null;
      }
      return null;
    }

    function selectSentenceAt(x, y, target) {
      if (!target || !target.closest || !target.closest(RD_SEL)) return;
      const pos = caretFromPoint(x, y);
      if (!pos || !pos.node || pos.node.nodeType !== 3) return;
      const node = pos.node, txt = node.textContent, off = pos.offset;
      // 문장 끝: 마침표/물음표/느낌표 뒤가 공백이거나 끝
      const isEnd = (i) => /[.!?。]/.test(txt[i]) && (i + 1 >= txt.length || /\s/.test(txt[i + 1]));
      let start = 0, end = txt.length;
      for (let i = off - 1; i >= 0; i--) { if (isEnd(i)) { start = i + 1; break; } }
      for (let i = off; i < txt.length; i++) { if (isEnd(i)) { end = i + 1; break; } }
      while (start < end && /\s/.test(txt[start])) start++;
      if (start >= end) return;
      const sel = window.getSelection();
      const r = document.createRange();
      r.setStart(node, start); r.setEnd(node, end);
      sel.removeAllRanges(); sel.addRange(r);
      onSelectionEnd();
    }

    /* 지점에 하이라이트(mark)가 있으면 그 요소 반환 */
    function markAtPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      return el && el.closest ? el.closest("mark.rd-hl") : null;
    }

    /* 읽기 모드 더블탭: 하이라이트 위 → 삭제, 아니면 → 문장 선택 */
    let dtSuppress = 0;
    function handleDoubleTap(x, y, target) {
      if (mode !== "reading") return;
      if (Date.now() < dtSuppress) return;   // 직전 처리 뒤 따라오는 dblclick 무시
      dtSuppress = Date.now() + 500;
      const mk = markAtPoint(x, y) || (target && target.closest ? target.closest("mark.rd-hl") : null);
      if (mk && mk.dataset.hid) {
        removeHighlight(mk.dataset.hid);
        const sel = window.getSelection(); if (sel) sel.removeAllRanges();
        removePopup();
        return;
      }
      selectSentenceAt(x, y, target);
    }

    const rdContainer = document.getElementById("readingContainer");
    rdContainer.addEventListener("dblclick", (e) => handleDoubleTap(e.clientX, e.clientY, e.target));
    let dtLast = 0, dtX = 0, dtY = 0;   // 모바일 더블탭 수동 감지
    rdContainer.addEventListener("touchend", (e) => {
      if (e.changedTouches.length !== 1) return;
      const t = e.changedTouches[0], now = Date.now();
      if (now - dtLast < 320 && Math.abs(t.clientX - dtX) < 30 && Math.abs(t.clientY - dtY) < 30) {
        dtLast = 0;
        handleDoubleTap(t.clientX, t.clientY, e.target);
      } else { dtLast = now; dtX = t.clientX; dtY = t.clientY; }
    });

    /* 이벤트 — selectionchange 디바운스로 모바일 길게눌러 선택에 대응 */
    let selTimer = null;
    function scheduleSel() { clearTimeout(selTimer); selTimer = setTimeout(onSelectionEnd, 280); }
    document.addEventListener("selectionchange", scheduleSel);
    document.addEventListener("mouseup", () => setTimeout(onSelectionEnd, 10));
    document.addEventListener("touchend", () => setTimeout(onSelectionEnd, 10));
    document.addEventListener("pointerdown", (e) => {
      if (popupEl && !e.target.closest(".hl-popup") && !e.target.closest(".hl-rect")) removePopup();
    });

    // 스크롤 시 상단바 숨김
    let lastY = 0;
    window.addEventListener("scroll", () => {
      const y = window.scrollY;
      const bar = document.getElementById("topbar");
      if (y > lastY && y > 80) bar.classList.add("hidden");
      else bar.classList.remove("hidden");
      lastY = y;
    });

    requirePat(start);
  </script>
</body>
</html>
